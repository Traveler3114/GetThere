<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin - GetThereAPI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <nav class="mb-4"><a href="/" class="text-decoration-none">&larr; Home</a></nav>
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="mb-0">Admin</h1>
    <button class="btn btn-outline-danger btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
  </div>
  <div class="row g-3">
    <div class="col-md-4">
      <a href="/admin/tickets.html" class="text-decoration-none">
        <div class="card h-100 shadow-sm">
          <div class="card-body text-center py-4">
            <i class="bi bi-ticket-perforated fs-1 text-primary"></i>
            <h5 class="card-title mt-2">Tickets</h5>
            <p class="card-text text-muted small">Manage ticket types and view purchases</p>
          </div>
        </div>
      </a>
    </div>
    <div class="col-md-4">
      <a href="/admin/users.html" class="text-decoration-none">
        <div class="card h-100 shadow-sm">
          <div class="card-body text-center py-4">
            <i class="bi bi-people fs-1 text-success"></i>
            <h5 class="card-title mt-2">Users</h5>
            <p class="card-text text-muted small">Browse registered users</p>
          </div>
        </div>
      </a>
    </div>
    <div class="col-md-4">
      <a href="/admin/audit.html" class="text-decoration-none">
        <div class="card h-100 shadow-sm">
          <div class="card-body text-center py-4">
            <i class="bi bi-journal-text fs-1 text-warning"></i>
            <h5 class="card-title mt-2">Audit Log</h5>
            <p class="card-text text-muted small">View system audit trail</p>
          </div>
        </div>
      </a>
    </div>
  </div>
</div>

<script>
function logout() {
  sessionStorage.removeItem('auth_token');
  sessionStorage.removeItem('refresh_token');
  window.location.href = '/admin/login.html';
}

function checkAuth() {
  const token = sessionStorage.getItem('auth_token');
  if (!token) {
    window.location.href = '/admin/login.html';
    return false;
  }
  return true;
}

document.addEventListener('DOMContentLoaded', () => {
  if (!checkAuth()) return;
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
