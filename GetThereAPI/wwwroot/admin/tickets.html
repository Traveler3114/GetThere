<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tickets - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <nav class="mb-4"><a href="/" class="text-decoration-none">&larr; Home</a> > <a href="/admin/" class="text-decoration-none">Admin</a></nav>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Tickets</h1>
    <div>
      <button class="btn btn-outline-primary btn-sm" onclick="loadData()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
    </div>
  </div>

  <ul class="nav nav-tabs mb-3" id="tabBar">
    <li class="nav-item"><button class="nav-link active" data-tab="options" onclick="switchTab('options')">Ticket Options</button></li>
    <li class="nav-item"><button class="nav-link" data-tab="mytickets" onclick="switchTab('mytickets')">My Tickets</button></li>
  </ul>

  <div id="loading" class="text-center py-4 text-muted d-none"><i class="bi bi-hourglass-split"></i> Loading...</div>
  <div id="error" class="alert alert-danger d-none"></div>
  <div id="content" class="d-none"><div class="alert alert-info">Loading...</div></div>

<script>
const BASE = '';
let currentTab = 'options';

function getHeaders() {
  const token = sessionStorage.getItem('auth_token');
  const h = {'Content-Type': 'application/json'};
  if (token) h['Authorization'] = 'Bearer ' + token;
  return h;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('#tabBar .nav-link').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  loadData();
}

async function loadData() {
  const token = sessionStorage.getItem('auth_token');
  if (!token) { window.location.href = '/admin/login.html'; return; }

  document.getElementById('loading').classList.remove('d-none');
  document.getElementById('error').classList.add('d-none');
  document.getElementById('content').classList.add('d-none');

  try {
    if (currentTab === 'options') {
      await loadOptions();
    } else {
      await loadMyTickets();
    }
    document.getElementById('loading').classList.add('d-none');
    document.getElementById('content').classList.remove('d-none');
  } catch(e) {
    document.getElementById('loading').classList.add('d-none');
    showError('Failed to load data: ' + e.message);
  }
}

async function loadOptions() {
  const r = await fetch('/tickets/options', { headers: getHeaders() });
  const j = await r.json();
  if (!j.success) throw new Error(j.message || 'Request failed');
  const options = j.data || [];
  if (!options.length) {
    document.getElementById('content').innerHTML = '<div class="alert alert-info">No ticket options available.</div>';
    return;
  }
  const rows = options.map(o => `<tr>
    <td>${o.id}</td>
    <td>${esc(o.adapterName)}</td>
    <td>${esc(o.name)}</td>
    <td>${esc(o.description||'-')}</td>
    <td class="fw-bold">${o.price.toFixed(2)} ${esc(o.currency)}</td>
    <td><span class="badge bg-secondary">${esc(o.ticketFormat)}</span></td>
    <td>${o.durationMinutes ? o.durationMinutes + ' min' : '-'}</td>
  </tr>`).join('');
  document.getElementById('content').innerHTML = `<div class="table-responsive"><table class="table table-striped table-hover"><thead class="table-dark"><tr><th>ID</th><th>Adapter</th><th>Name</th><th>Description</th><th>Price</th><th>Format</th><th>Duration</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

async function loadMyTickets() {
  const r = await fetch('/tickets', { headers: getHeaders() });
  const j = await r.json();
  if (!j.success) throw new Error(j.message || 'Request failed');
  const tickets = j.data || [];
  if (!tickets.length) {
    document.getElementById('content').innerHTML = '<div class="alert alert-info">No tickets purchased yet.</div>';
    return;
  }
  const rows = tickets.map(t => {
    const statusClass = t.status === 'Active' ? 'badge-active' : t.status === 'Used' ? 'badge-used' : t.status === 'Expired' ? 'badge-expired' : t.status === 'Cancelled' ? 'badge-cancelled' : 'badge-refunded';
    return `<tr>
      <td>${t.id}</td>
      <td>${esc(t.option ? t.option.name : '-')}</td>
      <td><span class="badge ${statusClass}">${esc(t.status)}</span></td>
      <td>${t.validFrom ? new Date(t.validFrom).toLocaleString() : '-'}</td>
      <td>${t.validTo ? new Date(t.validTo).toLocaleString() : '-'}</td>
      <td><span class="badge bg-secondary">${esc(t.format)}</span></td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><code class="small">${esc(t.data ? t.data.substring(0,40) + '...' : '-')}</code></td>
    </tr>`;
  }).join('');
  document.getElementById('content').innerHTML = `<div class="table-responsive"><table class="table table-striped table-hover"><thead class="table-dark"><tr><th>ID</th><th>Option</th><th>Status</th><th>Valid From</th><th>Valid To</th><th>Format</th><th>Data</th></tr></thead><tbody>${rows}</tbody></table></div><small class="text-muted">${tickets.length} ticket(s)</small>`;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('#tabBar .nav-link').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  loadData();
}

function getHeaders() {
  const token = sessionStorage.getItem('auth_token');
  const h = {'Content-Type': 'application/json'};
  if (token) h['Authorization'] = 'Bearer ' + token;
  return h;
}

function showError(msg) { const e = document.getElementById('error'); e.textContent = msg; e.classList.remove('d-none'); }
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

let currentTab = 'options';

document.addEventListener('DOMContentLoaded', () => {
  const token = sessionStorage.getItem('auth_token');
  if (!token) {
    window.location.href = '/admin/login.html';
  } else {
    loadData();
  }
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
