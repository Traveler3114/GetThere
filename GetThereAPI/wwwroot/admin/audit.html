<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Audit Log - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <nav class="mb-4"><a href="/" class="text-decoration-none">&larr; Home</a> > <a href="/admin/" class="text-decoration-none">Admin</a></nav>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Audit Log</h1>
    <div>
      <button class="btn btn-outline-primary btn-sm" onclick="loadData()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
      <button class="btn btn-outline-danger btn-sm ms-2" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>
  </div>

  <div id="loading" class="text-center py-4 text-muted d-none"><i class="bi bi-hourglass-split"></i> Loading...</div>
  <div id="error" class="alert alert-danger d-none"></div>
  <div id="content" class="d-none"></div>
  <div id="pagination" class="d-none d-flex justify-content-between align-items-center mt-2"></div>
</div>

<script>
const BASE = '';
let token = sessionStorage.getItem('auth_token') || '';

async function checkAuth() {
  if (!token) {
    window.location.href = '/admin/login.html';
    return false;
  }
  return true;
}

async function loadData() {
  if (!(await checkAuth())) return;
  document.getElementById('loading').classList.remove('d-none');
  document.getElementById('error').classList.add('d-none');
  document.getElementById('content').classList.add('d-none');
  document.getElementById('pagination').classList.add('d-none');
  try {
    await loadAudit();
    document.getElementById('loading').classList.add('d-none');
    document.getElementById('content').classList.remove('d-none');
  } catch(e) {
    document.getElementById('loading').classList.add('d-none');
    showError('Failed to load data: ' + e.message);
  }
}

function logout() {
  sessionStorage.removeItem('auth_token');
  sessionStorage.removeItem('refresh_token');
  window.location.href = '/admin/login.html';
}

function getHeaders() {
  const h = {'Content-Type': 'application/json'};
  if (token) h['Authorization'] = 'Bearer ' + token;
  return h;
}

async function loadAudit() {
  const r = await fetch(BASE + '/admin/audit?page=' + currentPage + '&pageSize=50', { headers: getHeaders() });
  const j = await r.json();
  if (!j.success) throw new Error(j.message || 'Request failed');
  const result = j.data || {};
  const entries = result.items || [];
  if (!entries.length) {
    document.getElementById('content').innerHTML = '<div class="alert alert-info">No audit entries found.</div>';
    document.getElementById('pagination').classList.add('d-none');
    return;
  }
  const rows = entries.map(e => `<tr>
    <td class="small text-muted">${e.id}</td>
    <td class="small">${new Date(e.createdAt).toLocaleString()}</td>
    <td>${esc(e.userEmail) || '<span class="text-muted">system</span>'}</td>
    <td><span class="badge bg-secondary">${esc(e.action)}</span></td>
    <td class="small">${esc(e.entityType)}</td>
    <td class="small text-muted">${esc(e.entityId)}</td>
    <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><code class="small">${esc(e.oldValues ? e.oldValues.substring(0,30) + '...' : '-')}</code></td>
    <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><code class="small">${esc(e.newValues ? e.newValues.substring(0,30) + '...' : '-')}</code></td>
  </tr>`).join('');
  document.getElementById('content').innerHTML = `<div class="table-responsive"><table class="table table-striped table-hover small"><thead class="table-dark"><tr><th>ID</th><th>Time</th><th>User</th><th>Action</th><th>Entity</th><th>Entity ID</th><th>Old</th><th>New</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  renderPagination(result);
}

function renderPagination(r) {
  const el = document.getElementById('pagination');
  el.classList.remove('d-none');
  const prevDisabled = !r.hasPreviousPage || currentPage <= 1;
  const nextDisabled = !r.hasNextPage;
  el.innerHTML = `<small class="text-muted">${r.total} entry(ies) &middot; Page ${r.page} of ${r.totalPages}</small>
    <div class="btn-group btn-group-sm">
      <button class="btn btn-outline-secondary" onclick="goPage(${currentPage - 1})" ${prevDisabled ? 'disabled' : ''}><i class="bi bi-chevron-left"></i></button>
      <button class="btn btn-outline-secondary" onclick="goPage(${currentPage + 1})" ${nextDisabled ? 'disabled' : ''}><i class="bi bi-chevron-right"></i></button>
    </div>`;
}

function goPage(p) {
  currentPage = p;
  loadData();
}

function showError(msg) { const e = document.getElementById('error'); e.textContent = msg; e.classList.remove('d-none'); }
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
