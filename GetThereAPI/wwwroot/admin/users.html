<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Users - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <nav class="mb-4"><a href="/" class="text-decoration-none">&larr; Home</a> &gt; <a href="/admin/" class="text-decoration-none">Admin</a></nav>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Users</h1>
    <div>
      <button class="btn btn-outline-primary btn-sm" onclick="loadData()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
    </div>
  </div>

  <div class="card mb-4 shadow-sm">
    <div class="card-body">
      <div class="row g-2 align-items-end">
        <div class="col-md-8">
          <label class="form-label small text-muted mb-1">Auth Token</label>
          <input type="text" id="tokenInput" class="form-control form-control-sm token-input" placeholder="Paste your JWT token here...">
        </div>
        <div class="col-md-4 d-flex gap-2">
          <button class="btn btn-primary btn-sm" onclick="setToken()"><i class="bi bi-key"></i> Set Token</button>
          <button class="btn btn-outline-danger btn-sm" onclick="clearToken()"><i class="bi bi-x-circle"></i> Clear</button>
        </div>
      </div>
      <div id="tokenStatus" class="small mt-2"></div>
    </div>
  </div>

  <div id="loading" class="text-center py-4 text-muted d-none"><i class="bi bi-hourglass-split"></i> Loading...</div>
  <div id="error" class="alert alert-danger d-none"></div>
  <div id="content" class="d-none"><div class="alert alert-info">Set an auth token and click Refresh to load data.</div></div>
  <div id="pagination" class="d-none d-flex justify-content-between align-items-center mt-2"></div>
</div>

<script>
const BASE = '';
let token = sessionStorage.getItem('adminToken') || '';
let currentPage = 1;

function setToken() {
  token = document.getElementById('tokenInput').value.trim();
  if (token) {
    sessionStorage.setItem('adminToken', token);
    document.getElementById('tokenStatus').innerHTML = '<span class="text-success"><i class="bi bi-check-circle"></i> Token set</span>';
    loadData();
  } else {
    document.getElementById('tokenStatus').innerHTML = '<span class="text-danger">Please paste a token.</span>';
  }
}

function clearToken() {
  token = '';
  sessionStorage.removeItem('adminToken');
  document.getElementById('tokenInput').value = '';
  document.getElementById('tokenStatus').innerHTML = '<span class="text-muted">Token cleared</span>';
  document.getElementById('content').innerHTML = '<div class="alert alert-info">Set an auth token and click Refresh to load data.</div>';
  document.getElementById('pagination').classList.add('d-none');
}

function getHeaders() {
  const h = {'Content-Type': 'application/json'};
  if (token) h['Authorization'] = 'Bearer ' + token;
  return h;
}

document.addEventListener('DOMContentLoaded', () => {
  if (token) {
    document.getElementById('tokenInput').value = token;
    document.getElementById('tokenStatus').innerHTML = '<span class="text-success"><i class="bi bi-check-circle"></i> Token loaded from session</span>';
  }
});

async function loadData() {
  if (!token) { alert('Please set an auth token first.'); return; }
  document.getElementById('loading').classList.remove('d-none');
  document.getElementById('error').classList.add('d-none');
  document.getElementById('content').classList.add('d-none');
  document.getElementById('pagination').classList.add('d-none');
  try {
    await loadUsers();
    document.getElementById('loading').classList.add('d-none');
    document.getElementById('content').classList.remove('d-none');
  } catch(e) {
    document.getElementById('loading').classList.add('d-none');
    showError('Failed to load data: ' + e.message);
  }
}

async function loadUsers() {
  const r = await fetch(BASE + '/admin/users?page=' + currentPage + '&pageSize=20', { headers: getHeaders() });
  const j = await r.json();
  if (!j.success) throw new Error(j.message || 'Request failed');
  const result = j.data || {};
  const users = result.items || [];
  if (!users.length) {
    document.getElementById('content').innerHTML = '<div class="alert alert-info">No users found.</div>';
    document.getElementById('pagination').classList.add('d-none');
    return;
  }
  const rows = users.map(u => `<tr>
    <td class="text-muted small">${esc(u.id)}</td>
    <td>${esc(u.email)}</td>
    <td>${esc(u.fullName) || '<span class="text-muted">-</span>'}</td>
    <td class="small">${u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '-'}</td>
    <td class="small">${u.lastLogin ? new Date(u.lastLogin).toLocaleString() : '<span class="text-muted">never</span>'}</td>
  </tr>`).join('');
  document.getElementById('content').innerHTML = `<div class="table-responsive"><table class="table table-striped table-hover"><thead class="table-dark"><tr><th>ID</th><th>Email</th><th>Name</th><th>Created</th><th>Last Login</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  renderPagination(result);
}

function renderPagination(r) {
  const el = document.getElementById('pagination');
  el.classList.remove('d-none');
  const prevDisabled = !r.hasPreviousPage || currentPage <= 1;
  const nextDisabled = !r.hasNextPage;
  el.innerHTML = `<small class="text-muted">${r.totalCount} user(s) &middot; Page ${r.page} of ${r.totalPages}</small>
    <div class="btn-group btn-group-sm">
      <button class="btn btn-outline-secondary" onclick="goPage(${currentPage - 1})" ${prevDisabled ? 'disabled' : ''}><i class="bi bi-chevron-left"></i></button>
      <button class="btn btn-outline-secondary" onclick="goPage(${currentPage + 1})" ${nextDisabled ? 'disabled' : ''}><i class="bi bi-chevron-right"></i></button>
    </div>`;
}

function goPage(p) {
  currentPage = p;
  loadData();
}

function showError(msg) { const e = document.getElementById('error'); e.textContent = msg; e.classList.remove('d-none'); }
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
