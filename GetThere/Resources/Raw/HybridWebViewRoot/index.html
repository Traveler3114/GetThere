<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        html, body, #map {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI',Arial,sans-serif;
        }

        /* ── shared panel base ─────────────────────────────────── */
        .bottom-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-radius: 18px 18px 0 0;
            box-shadow: 0 -4px 24px rgba(0,0,0,0.2);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(.4,0,.2,1);
            display: flex;
            flex-direction: column;
            touch-action: pan-y;
        }

            .bottom-panel.open {
                transform: translateY(0);
            }

        .panel-handle {
            width: 44px;
            height: 5px;
            background: #d0d0d0;
            border-radius: 3px;
            margin: 10px auto 0;
            flex-shrink: 0;
            cursor: grab;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px 8px;
            flex-shrink: 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .panel-close {
            background: none;
            border: none;
            font-size: 22px;
            color: #888;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            margin-left: auto;
        }

            .panel-close:hover {
                color: #333;
            }

        .panel-body {
            overflow-y: auto;
            flex: 1;
        }

        /* ── Stop schedule panel ────────────────────────────────── */
        #stop-sheet {
            z-index: 1000;
            max-height: 72vh;
        }

        #sheet-stop-name {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a1a;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #sheet-stop-id {
            font-size: 11px;
            color: #999;
        }

        #sheet-date {
            padding: 4px 16px 8px;
            font-size: 12px;
            color: #888;
            flex-shrink: 0;
        }

        #sheet-body {
            padding: 0 12px 20px;
        }

        /* ── Trip detail panel ──────────────────────────────────── */
        #trip-panel {
            z-index: 1001;
            max-height: 80vh;
        }

        .trip-panel-route {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        #trip-panel-headsign {
            font-size: 15px;
            font-weight: 700;
            color: #1a1a1a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #trip-panel-subtitle {
            padding: 4px 16px 10px;
            font-size: 12px;
            color: #888;
            flex-shrink: 0;
        }

        #trip-panel-loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 40px;
            color: #666;
            font-size: 14px;
        }

        #trip-panel-body {
            padding: 0 0 24px;
        }

        /* route pill */
        .route-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 42px;
            height: 28px;
            padding: 0 10px;
            border-radius: 7px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: -0.3px;
            flex-shrink: 0;
        }

            .route-pill.tram {
                background: #e53935;
                color: #fff;
            }

            .route-pill.bus {
                background: #1565c0;
                color: #fff;
            }

            .route-pill.rail {
                background: #6a1b9a;
                color: #fff;
            }

        /* ── Stop rows in trip panel ─────────────────────────────── */
        .trip-stop {
            display: flex;
            align-items: center;
            padding: 0 16px;
            min-height: 56px;
            position: relative;
        }

            /* vertical line */
            .trip-stop::before {
                content: '';
                position: absolute;
                left: 28px;
                top: 0;
                bottom: 0;
                width: 2px;
                background: #e8e8e8;
                z-index: 0;
            }

            .trip-stop:first-child::before {
                top: 50%;
            }

            .trip-stop:last-child::before {
                bottom: 50%;
            }

        /* dot */
        .trip-stop-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            background: #d0d0d0;
            border: 2px solid #fff;
            box-shadow: 0 0 0 2px #d0d0d0;
            z-index: 1;
            margin-right: 14px;
            transition: all 0.15s;
        }

        .trip-stop.current .trip-stop-dot {
            width: 18px;
            height: 18px;
            background: #1565c0;
            border: 3px solid #fff;
            box-shadow: 0 0 0 3px rgba(21,101,192,0.3);
        }

        .trip-stop.passed .trip-stop-dot {
            background: #c8e6c9;
            box-shadow: 0 0 0 2px #c8e6c9;
        }

        /* stop info */
        .trip-stop-info {
            flex: 1;
            min-width: 0;
        }

        .trip-stop-name {
            font-size: 14px;
            font-weight: 500;
            color: #222;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .trip-stop.current .trip-stop-name {
            font-weight: 700;
            color: #1565c0;
        }

        .trip-stop.passed .trip-stop-name {
            color: #aaa;
        }

        .trip-stop.passed {
            opacity: 0.6;
        }

        /* times column */
        .trip-stop-times {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1px;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .ts-sched {
            font-size: 11px;
            color: #bbb;
            text-decoration: line-through;
        }

        .ts-eta {
            font-size: 14px;
            font-weight: 700;
        }

            .ts-eta.late {
                color: #e53935;
            }

            .ts-eta.early {
                color: #ef6c00;
            }

            .ts-eta.ontime {
                color: #2e7d32;
            }

        .ts-only {
            font-size: 14px;
            font-weight: 500;
            color: #444;
        }

        .trip-stop.passed .ts-only {
            color: #bbb;
        }

        .trip-stop.current .ts-only {
            color: #1565c0;
            font-weight: 700;
        }

        /* ── Stop schedule UI ───────────────────────────────────── */
        .sched-loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 32px;
            color: #666;
            font-size: 14px;
        }

        .sched-empty {
            display: none;
            padding: 32px;
            text-align: center;
            color: #aaa;
            font-size: 14px;
        }

        .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid #e0e0e0;
            border-top-color: #1565C0;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* route group in stop schedule */
        .route-group {
            margin-top: 12px;
            border: 1px solid #ebebeb;
            border-radius: 12px;
            overflow: hidden;
        }

        .route-group-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: #f8f8f8;
            cursor: pointer;
            user-select: none;
        }

            .route-group-header:active {
                background: #f0f0f0;
            }

        .route-headsign {
            font-size: 14px;
            font-weight: 600;
            color: #222;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .route-count {
            font-size: 12px;
            color: #888;
            flex-shrink: 0;
        }

        .route-chevron {
            font-size: 16px;
            color: #bbb;
            transition: transform 0.2s;
        }

        .route-group.expanded .route-chevron {
            transform: rotate(180deg);
        }

        .route-times {
            display: none;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px 12px 12px;
            background: #fff;
            border-top: 1px solid #f0f0f0;
        }

        .route-group.expanded .route-times {
            display: flex;
        }

        /* time chips */
        .time-chip {
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #1565c0;
            background: #e8f0fe;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

            .time-chip.next {
                background: #1565c0;
                color: #fff;
            }

            .time-chip.click {
                cursor: pointer;
            }

                .time-chip.click:active {
                    opacity: 0.75;
                }

        .sched-strike {
            text-decoration: line-through;
            opacity: 0.5;
            font-size: 11px;
        }

        .eta-time {
            font-weight: 700;
        }

        .delay-badge {
            font-size: 10px;
            font-weight: 700;
        }

            .delay-badge.late {
                color: #e53935;
            }

            .delay-badge.early {
                color: #ef6c00;
            }

            .delay-badge.ontime {
                color: #4caf50;
            }

        .time-chip.next .delay-badge.late {
            color: #ffcdd2;
        }

        .time-chip.next .delay-badge.early {
            color: #ffe0b2;
        }

        .time-chip.next .delay-badge.ontime {
            color: #c8e6c9;
        }

        .live-dot {
            color: #4caf50;
            font-size: 9px;
            animation: pulse 1.5s infinite;
        }

        .time-chip.next .live-dot {
            color: #a5d6a7;
        }

        .tracked-count {
            font-size: 11px;
            color: #4caf50;
            font-weight: 600;
        }

        @keyframes pulse {
            0%,100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Stop schedule panel -->
    <div id="stop-sheet" class="bottom-panel">
        <div class="panel-handle"></div>
        <div class="panel-header">
            <span id="sheet-stop-name">Stop</span>
            <span id="sheet-stop-id"></span>
            <button class="panel-close" id="sheet-close">✕</button>
        </div>
        <div id="sheet-date"></div>
        <div class="sched-loading" id="sheet-loading"><div class="spinner"></div> Loading schedule…</div>
        <div class="sched-empty" id="sheet-empty">No departures today for this stop.</div>
        <div class="panel-body" id="sheet-body"></div>
    </div>

    <!-- Trip detail panel -->
    <div id="trip-panel" class="bottom-panel">
        <div class="panel-handle"></div>
        <div class="panel-header">
            <div class="trip-panel-route">
                <span id="trip-panel-pill" class="route-pill bus">1</span>
                <span id="trip-panel-headsign">Route</span>
            </div>
            <button class="panel-close" id="trip-panel-close">✕</button>
        </div>
        <div id="trip-panel-subtitle"></div>
        <div id="trip-panel-loading" class="sched-loading"><div class="spinner"></div> Loading stops…</div>
        <div class="panel-body" id="trip-panel-body"></div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
    <script>
        const MAPTILER_KEY = "3mONySRY1DAYg6mgQean";
        const map = new maplibregl.Map({
            container: 'map',
            style: `https://api.maptiler.com/maps/streets/style.json?key=${MAPTILER_KEY}`,
            center: [15.980820, 45.784044], zoom: 13
        });
        map.addControl(new maplibregl.NavigationControl());

        let userMarker = new maplibregl.Marker({ color: '#4285F4' })
            .setLngLat([15.980820, 45.784044]).addTo(map);

        function updateMapLocation(lng, lat) {
            map.setCenter([lng, lat]); userMarker.setLngLat([lng, lat]); map.setZoom(15);
        }

        // ─── State ───────────────────────────────────────────────────
        let routeColorMap = {}, routeNameMap = {}, routeTypeMap = {}, routeShapeMap = {};
        let vehicleMarkers = {}, activeRouteId = null, stopMarkers = [];
        let _suppressMapClick = false;

        // ─── All panel element refs declared up-front ─────────────────
        // (must be before any function that references them)
        const sheet = document.getElementById('stop-sheet');
        const sheetName = document.getElementById('sheet-stop-name');
        const sheetSid = document.getElementById('sheet-stop-id');
        const sheetDate = document.getElementById('sheet-date');
        const sheetLoad = document.getElementById('sheet-loading');
        const sheetEmpty = document.getElementById('sheet-empty');
        const sheetBody = document.getElementById('sheet-body');

        const tripPanel = document.getElementById('trip-panel');
        const tripPill = document.getElementById('trip-panel-pill');
        const tripHead = document.getElementById('trip-panel-headsign');
        const tripSubtitle = document.getElementById('trip-panel-subtitle');
        const tripLoading = document.getElementById('trip-panel-loading');
        const tripBody = document.getElementById('trip-panel-body');

        let currentStopId = null;

        // ─── Helpers ─────────────────────────────────────────────────
        function typeColor(t) {
            if (t === 0) return 'e53935';
            if (t === 11) return 'e65100';
            if (t === 1 || t === 2) return '6a1b9a';
            return '1565c0';
        }
        function escHtml(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
        function pillClass(t) { return t === 0 || t === 11 ? 'tram' : t === 1 || t === 2 ? 'rail' : 'bus'; }

        // ─── Stop icon ───────────────────────────────────────────────
        function makeStopIcon(routeType) {
            const isTram = routeType === 0 || routeType === 11;
            const color = isTram ? '#c62828' : '#1565C0', label = isTram ? 'T' : 'B';
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
                    <circle cx="10" cy="10" r="9" fill="white" stroke="${color}" stroke-width="2.5"/>
                    <text x="10" y="14" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" font-weight="bold" fill="${color}">${label}</text>
                </svg>`;
            const el = document.createElement('div');
            el.innerHTML = svg; el.style.cssText = 'cursor:pointer;width:20px;height:20px;';
            return el;
        }

        // ─── Vehicle icon ─────────────────────────────────────────────
        function makeVehicleIcon(color, routeType, bearing, shortName) {
            const hex = '#' + (color || 'e53935').replace('#', '');
            const isTram = routeType === 0 || routeType === 11, isRail = routeType === 1 || routeType === 2;
            const label = shortName || '', border = isTram ? '#FF6F00' : isRail ? '#6A1B9A' : '#fff';
            const icon = isTram ? '🚋' : isRail ? '🚇' : '🚌', fsize = label.length > 2 ? '9' : '11';
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="42" viewBox="0 0 36 42">
                    <polygon points="18,0 24,10 12,10" fill="${hex}" opacity="0.95"/>
                    <rect x="2" y="9" width="32" height="26" rx="6" ry="6" fill="${hex}" stroke="${border}" stroke-width="2"/>
                    <text x="8" y="21" text-anchor="middle" font-size="9" font-family="Arial" fill="rgba(255,255,255,0.75)">${icon}</text>
                    <text x="20" y="27" text-anchor="middle" font-size="${fsize}" font-family="Arial,sans-serif" font-weight="bold"
                          fill="white" paint-order="stroke" stroke="rgba(0,0,0,0.3)" stroke-width="2">${label}</text>
                </svg>`;
            const el = document.createElement('div');
            el.innerHTML = svg;
            el.style.cssText = `cursor:pointer;width:36px;height:42px;transform:rotate(${bearing || 0}deg);transform-origin:18px 21px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));`;
            return el;
        }

        // ─── renderStops ─────────────────────────────────────────────
        function renderStops(stops) {
            stopMarkers.forEach(m => m.remove()); stopMarkers = [];
            stops.forEach(s => {
                const el = makeStopIcon(s.routeType ?? 3);
                el.addEventListener('click', e => {
                    _suppressMapClick = true;
                    openStopSheet(s.stopId, s.name, s.routeType ?? 3);
                });
                stopMarkers.push(new maplibregl.Marker({ element: el, anchor: 'center' }).setLngLat([s.lon, s.lat]).addTo(map));
            });
        }

        // ─── Stop schedule sheet ──────────────────────────────────────
        document.getElementById('sheet-close').addEventListener('click', e => { e.stopPropagation(); closeStopSheet(); });
        sheet.addEventListener('click', e => e.stopPropagation());

        function openStopSheet(stopId, stopName, stopRouteType) {
            // Close trip panel instantly
            tripPanel.classList.remove('open');
            currentStopId = stopId;
            sheetName.textContent = stopName;
            const isTram = stopRouteType === 0 || stopRouteType === 11;
            sheetSid.textContent = (isTram ? '🚋 ' : '🚌 ') + '#' + stopId;
            const now = new Date(), days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'],
                months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            sheetDate.textContent = days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
            sheetLoad.style.display = 'flex';
            sheetEmpty.style.display = 'none';
            sheetBody.innerHTML = '';
            sheet.classList.add('open');
            window._pendingMsg = 'stopSchedule:' + stopId;
        }

        function closeStopSheet() {
            sheet.classList.remove('open');
            currentStopId = null;
        }

        // ─── renderStopSchedule (called from C#) ─────────────────────
        function renderStopSchedule(data) {
            if (typeof data === 'string') data = JSON.parse(data);
            sheetLoad.style.display = 'none';
            sheetBody.innerHTML = '';
            const groups = data.groups || [];
            if (groups.length === 0) { sheetEmpty.style.display = 'block'; return; }

            const now = new Date(), nowMins = now.getHours() * 60 + now.getMinutes();

            groups.forEach((g, gi) => {
                const rType = routeTypeMap[g.routeId] ?? 3;
                const pc = pillClass(rType);
                const deps = g.departures || [];

                const timesHtml = deps.map((d, i) => {
                    const isNext = i === 0;
                    let cls = 'time-chip' + (isNext ? ' next' : '');
                    const canClick = d.isTracked || !!d.estimatedTime;
                    if (canClick) cls += ' click';

                    const clickAttr = canClick
                        ? `onclick="_suppressMapClick=true;window._pendingMsg='tripDetail:${d.tripId}'"` : '';

                    const hasEta = d.estimatedTime && d.estimatedTime !== d.scheduledTime;
                    if (hasEta) {
                        const delay = d.delayMinutes ?? 0;
                        let badge = delay > 1 ? `<span class="delay-badge late">+${delay}'</span>`
                            : delay < -1 ? `<span class="delay-badge early">${delay}'</span>`
                                : `<span class="delay-badge ontime">✓</span>`;
                        const dot = d.isTracked ? `<span class="live-dot">●</span>` : '';
                        return `<span class="${cls}" ${clickAttr}><span class="sched-strike">${d.scheduledTime}</span><span class="eta-time">${d.estimatedTime}</span>${badge}${dot}</span>`;
                    } else if (d.isTracked) {
                        return `<span class="${cls}" ${clickAttr}>${d.scheduledTime}<span class="live-dot">●</span></span>`;
                    } else {
                        return `<span class="${cls}">${d.scheduledTime}</span>`;
                    }
                }).join('');

                const tracked = deps.filter(d => d.isTracked).length;
                const etaOnly = deps.filter(d => !d.isTracked && d.estimatedTime).length;
                const rtBadge = tracked > 0 ? `&nbsp;<span class="tracked-count">📡&nbsp;${tracked}</span>`
                    : etaOnly > 0 ? `&nbsp;<span class="tracked-count" style="color:#ef6c00">⏱&nbsp;${etaOnly}</span>` : '';
                const countHtml = deps.length + '&nbsp;dep.' + rtBadge;

                const div = document.createElement('div');
                div.className = 'route-group' + (gi === 0 ? ' expanded' : '');
                div.innerHTML = `
                        <div class="route-group-header" onclick="this.parentElement.classList.toggle('expanded')">
                            <span class="route-pill ${pc}">${escHtml(g.shortName)}</span>
                            <span class="route-headsign">${escHtml(g.headsign)}</span>
                            <span class="route-count">${countHtml}</span>
                            <span class="route-chevron">▾</span>
                        </div>
                        <div class="route-times">${timesHtml}</div>`;
                sheetBody.appendChild(div);
            });

            requestAnimationFrame(() => {
                const next = sheetBody.querySelector('.time-chip.next');
                if (next) next.scrollIntoView({ block: 'nearest' });
            });
        }

        // ─── Trip detail panel ────────────────────────────────────────
        document.getElementById('trip-panel-close').addEventListener('click', e => { e.stopPropagation(); closeTripPanel(); });
        tripPanel.addEventListener('click', e => e.stopPropagation());

        function closeTripPanel() {
            tripPanel.classList.remove('open');
        }

        function openTripPanel(tripId) {
            // Close stop sheet instantly — not just animate, fully hide
            sheet.classList.remove('open');
            currentStopId = null;
            // Show loading state immediately
            tripPill.className = 'route-pill bus'; tripPill.textContent = '…';
            tripHead.textContent = 'Loading…';
            tripSubtitle.textContent = '';
            tripLoading.style.display = 'flex';
            tripBody.innerHTML = '';
            tripPanel.classList.add('open');
            window._pendingMsg = 'tripDetail:' + tripId;
        }

        // ─── renderTripDetail (called from C#) ───────────────────────
        function renderTripDetail(data) {
            if (typeof data === 'string') data = JSON.parse(data);

            tripLoading.style.display = 'none';

            const rType = data.routeType ?? 3, pc = pillClass(rType);
            tripPill.className = 'route-pill ' + pc;
            tripPill.textContent = data.shortName || data.routeId || '?';
            tripHead.textContent = data.headsign || '';

            const tracked = data.isTracked ? '📡 Live' : data.stops?.some(s => s.estimatedTime) ? '⏱ Predicted' : '📅 Scheduled';
            tripSubtitle.textContent = tracked;
            tripSubtitle.style.cssText = 'padding:2px 16px 10px;font-size:12px;color:#888;flex-shrink:0';

            tripBody.innerHTML = '';
            const stops = data.stops || [], curIdx = data.currentStopIndex ?? 0;

            stops.forEach((s, i) => {
                const isPassed = s.isPassed, isCurrent = i === curIdx && !isPassed;
                let cls = 'trip-stop';
                if (isPassed) cls += ' passed';
                if (isCurrent) cls += ' current';

                let timesHtml = '';
                const hasEta = s.estimatedTime && s.estimatedTime !== s.scheduledTime;
                if (hasEta) {
                    const d = s.delayMinutes ?? 0;
                    const ec = d > 1 ? 'late' : d < -1 ? 'early' : 'ontime';
                    timesHtml = `<div class="trip-stop-times">
                            <span class="ts-sched">${s.scheduledTime}</span>
                            <span class="ts-eta ${ec}">${s.estimatedTime}</span>
                        </div>`;
                } else {
                    timesHtml = `<div class="trip-stop-times">
                            <span class="ts-only">${s.scheduledTime}</span>
                        </div>`;
                }

                const row = document.createElement('div');
                row.className = cls;
                row.innerHTML = `<div class="trip-stop-dot"></div>
                        <div class="trip-stop-info"><div class="trip-stop-name">${escHtml(s.stopName)}</div></div>
                        ${timesHtml}`;
                tripBody.appendChild(row);
            });

            // Fly to vehicle
            if (data.isTracked && data.vehicleLat && data.vehicleLon)
                map.flyTo({ center: [data.vehicleLon, data.vehicleLat], zoom: 15, duration: 600 });

            if (data.routeId) showRoute(data.routeId);

            requestAnimationFrame(() => {
                const cur = tripBody.querySelector('.trip-stop.current');
                if (cur) cur.scrollIntoView({ block: 'center' });
            });
        }

        // Attach vehicle click to open trip panel
        function attachVehicleClick(el, v, color, rId) {
            el.addEventListener('click', e => {
                e.stopPropagation(); _suppressMapClick = true;
                closeStopSheet();
                const tid = v.tripId || v.vehicleId;
                if (tid) openTripPanel(tid);
                else { showRoute(rId); }
            });
        }

        // ─── renderRoutes ─────────────────────────────────────────────
        function renderRoutes(routes) {
            clearActiveRoute();
            routeColorMap = {}; routeNameMap = {}; routeTypeMap = {}; routeShapeMap = {};
            routes.forEach(r => {
                routeColorMap[r.routeId] = typeColor(r.routeType);
                routeNameMap[r.routeId] = r.shortName || r.routeId;
                routeTypeMap[r.routeId] = r.routeType ?? 3;
                if (r.shape && r.shape.length >= 2) routeShapeMap[r.routeId] = r.shape;
            });
        }

        // ─── Route line ───────────────────────────────────────────────
        function showRoute(routeId) {
            clearActiveRoute();
            const shape = routeShapeMap[routeId];
            if (!shape || shape.length < 2) return;
            const color = '#' + (routeColorMap[routeId] || '1565c0');
            map.addSource('active-route', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: shape } } });
            map.addLayer({ id: 'active-route-outline', type: 'line', source: 'active-route', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': '#000', 'line-width': 9, 'line-opacity': 0.12 } });
            map.addLayer({ id: 'active-route', type: 'line', source: 'active-route', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': color, 'line-width': 5, 'line-opacity': 0.95 } });
            activeRouteId = routeId;
        }

        function clearActiveRoute() {
            try {
                if (map.getLayer('active-route-outline')) map.removeLayer('active-route-outline');
                if (map.getLayer('active-route')) map.removeLayer('active-route');
                if (map.getSource('active-route')) map.removeSource('active-route');
            } catch (e) { }
            activeRouteId = null;
        }

        // ─── renderVehicles ───────────────────────────────────────────
        let vehiclePopup = new maplibregl.Popup({ closeButton: true, offset: 18 });

        function renderVehicles(vehicles) {
            const seen = new Set();
            vehicles.forEach(v => {
                seen.add(v.vehicleId);
                const rId = v.routeId || '', rType = routeTypeMap[rId] ?? v.routeType ?? 3;
                const color = typeColor(rType), sName = routeNameMap[rId] || rId || '';
                if (vehicleMarkers[v.vehicleId]) {
                    // Remove old marker and recreate — avoids fighting MapLibre's
                    // internal transform/positioning on getElement()
                    vehicleMarkers[v.vehicleId].marker.remove();
                    delete vehicleMarkers[v.vehicleId];
                }
                {
                    const el = makeVehicleIcon(color, rType, v.bearing, sName);
                    attachVehicleClick(el, v, color, rId);
                    vehicleMarkers[v.vehicleId] = {
                        marker: new maplibregl.Marker({ element: el, anchor: 'center' }).setLngLat([v.lon, v.lat]).addTo(map),
                        routeId: rId
                    };
                }
            });
            for (const id in vehicleMarkers)
                if (!seen.has(id)) { vehicleMarkers[id].marker.remove(); delete vehicleMarkers[id]; }
        }

        function clearVehicles() {
            Object.values(vehicleMarkers).forEach(e => e.marker.remove());
            vehicleMarkers = {}; clearActiveRoute(); vehiclePopup.remove();
        }

        // ─── Map click ────────────────────────────────────────────────
        map.on('click', () => {
            if (_suppressMapClick) { _suppressMapClick = false; return; }
            clearActiveRoute(); vehiclePopup.remove(); closeTripPanel();
        });

        // ─── Swipe to close ───────────────────────────────────────────
        function addSwipeClose(el, closeFn) {
            let y0 = 0;
            el.addEventListener('touchstart', e => { y0 = e.touches[0].clientY; }, { passive: true });
            el.addEventListener('touchend', e => { if (e.changedTouches[0].clientY - y0 > 80) closeFn(); }, { passive: true });
        }
        addSwipeClose(sheet, closeStopSheet);
        addSwipeClose(tripPanel, closeTripPanel);

    </script>
</body>
</html>
