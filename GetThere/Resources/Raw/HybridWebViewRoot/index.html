<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        html, body, #map {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI',Arial,sans-serif;
        }

        /* ── Vehicle popup ───────────── */
        .vehicle-popup {
            font-family: sans-serif;
            min-width: 150px;
        }

            .vehicle-popup .route-badge {
                display: inline-block;
                padding: 3px 10px;
                border-radius: 5px;
                color: #fff;
                font-weight: bold;
                font-size: 15px;
                margin-bottom: 5px;
            }

            .vehicle-popup .info {
                color: #555;
                font-size: 12px;
                margin-top: 2px;
            }

        /* ── Stop schedule bottom sheet ─ */
        #stop-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-radius: 18px 18px 0 0;
            box-shadow: 0 -4px 24px rgba(0,0,0,0.18);
            transform: translateY(100%);
            transition: transform 0.32s cubic-bezier(.4,0,.2,1);
            z-index: 1000;
            max-height: 72vh;
            display: flex;
            flex-direction: column;
            touch-action: pan-y;
        }

            #stop-sheet.open {
                transform: translateY(0);
            }

        #sheet-handle {
            width: 44px;
            height: 5px;
            background: #d0d0d0;
            border-radius: 3px;
            margin: 10px auto 0;
            flex-shrink: 0;
            cursor: grab;
        }

        #sheet-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px 6px;
            flex-shrink: 0;
            border-bottom: 1px solid #f0f0f0;
        }

        #sheet-stop-name {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a1a;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #sheet-stop-id {
            font-size: 11px;
            color: #999;
            white-space: nowrap;
        }

        #sheet-close {
            background: none;
            border: none;
            font-size: 22px;
            color: #888;
            cursor: pointer;
            padding: 0 0 0 8px;
            line-height: 1;
        }

            #sheet-close:hover {
                color: #333;
            }

        #sheet-date {
            padding: 4px 16px 8px;
            font-size: 12px;
            color: #888;
            flex-shrink: 0;
        }

        #sheet-loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 32px;
            color: #666;
            font-size: 14px;
        }

        .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid #e0e0e0;
            border-top-color: #1565C0;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #sheet-empty {
            display: none;
            padding: 32px 16px;
            text-align: center;
            color: #aaa;
            font-size: 14px;
        }

        #sheet-body {
            overflow-y: auto;
            flex: 1;
            padding: 0 12px 20px;
        }

        /* ── Route group card ──────────── */
        .route-group {
            margin-top: 12px;
            border: 1px solid #ebebeb;
            border-radius: 12px;
            overflow: hidden;
        }

        .route-group-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: #f8f8f8;
            cursor: pointer;
            user-select: none;
        }

            .route-group-header:active {
                background: #f0f0f0;
            }

        .route-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 42px;
            height: 28px;
            padding: 0 8px;
            border-radius: 7px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: -0.3px;
            flex-shrink: 0;
        }

            .route-pill.tram {
                background: #e53935;
                color: #fff;
            }

            .route-pill.bus {
                background: #1565c0;
                color: #fff;
            }

            .route-pill.rail {
                background: #6a1b9a;
                color: #fff;
            }

        .route-headsign {
            font-size: 14px;
            font-weight: 600;
            color: #222;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .route-count {
            font-size: 12px;
            color: #888;
            flex-shrink: 0;
        }

        .route-chevron {
            font-size: 16px;
            color: #bbb;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .route-group.expanded .route-chevron {
            transform: rotate(180deg);
        }

        .route-times {
            display: none;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px 12px 12px;
            background: #fff;
            border-top: 1px solid #f0f0f0;
        }

        .route-group.expanded .route-times {
            display: flex;
        }

        /* ── Time chips ────────────────── */
        .time-chip {
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #1565c0;
            background: #e8f0fe;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

            .time-chip.next {
                background: #1565c0;
                color: #fff;
            }

        /* tracked chip — scheduled struck through + ETA */
        .sched-strike {
            text-decoration: line-through;
            opacity: 0.55;
            font-size: 11px;
        }

        .eta-time {
            font-weight: 700;
        }

        .delay-badge {
            font-size: 10px;
            font-weight: 700;
        }

            .delay-badge.late {
                color: #f44336;
            }

            .delay-badge.early {
                color: #ff9800;
            }

            .delay-badge.ontime {
                color: #4caf50;
            }

        .time-chip.next .sched-strike {
            opacity: 0.6;
        }

        .time-chip.next .delay-badge.late {
            color: #ffcdd2;
        }

        .time-chip.next .delay-badge.early {
            color: #ffe0b2;
        }

        .time-chip.next .delay-badge.ontime {
            color: #c8e6c9;
        }

        /* untracked future time */
        .live-dot {
            color: #4caf50;
            font-size: 9px;
            animation: pulse 1.5s infinite;
        }

        .time-chip.next .live-dot {
            color: #a5d6a7;
        }

        .tracked-count {
            font-size: 11px;
            color: #4caf50;
            font-weight: 600;
        }

        @keyframes pulse {
            0%,100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div id="stop-sheet">
        <div id="sheet-handle"></div>
        <div id="sheet-header">
            <span id="sheet-stop-name">Stop</span>
            <span id="sheet-stop-id"></span>
            <button id="sheet-close">✕</button>
        </div>
        <div id="sheet-date"></div>
        <div id="sheet-loading"><div class="spinner"></div> Loading schedule…</div>
        <div id="sheet-empty">No departures today for this stop.</div>
        <div id="sheet-body"></div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
    <script>
        const MAPTILER_KEY = "3mONySRY1DAYg6mgQean";

        const map = new maplibregl.Map({
            container: 'map',
            style: `https://api.maptiler.com/maps/streets/style.json?key=${MAPTILER_KEY}`,
            center: [15.980820, 45.784044], zoom: 13
        });
        map.addControl(new maplibregl.NavigationControl());

        let userMarker = new maplibregl.Marker({ color: '#4285F4' })
            .setLngLat([15.980820, 45.784044]).addTo(map);

        function updateMapLocation(lng, lat) {
            map.setCenter([lng, lat]); userMarker.setLngLat([lng, lat]); map.setZoom(15);
        }

        // ─── State ───────────────────────────────────────────────────
        let routeColorMap = {}, routeNameMap = {}, routeTypeMap = {}, routeShapeMap = {};
        let vehicleMarkers = {}, activeRouteId = null, stopMarkers = [];
        let _suppressMapClick = false;

        // ─── Stop icon (T=tram red, B=bus blue) ──────────────────────
        function makeStopIcon(routeType) {
            const isTram = routeType === 0 || routeType === 11;
            const color = isTram ? '#c62828' : '#1565C0';
            const label = isTram ? 'T' : 'B';
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
                    <circle cx="10" cy="10" r="9" fill="white" stroke="${color}" stroke-width="2.5"/>
                    <text x="10" y="14" text-anchor="middle" font-size="11"
                          font-family="Arial,sans-serif" font-weight="bold" fill="${color}">${label}</text>
                </svg>`;
            const el = document.createElement('div');
            el.innerHTML = svg; el.style.cssText = 'cursor:pointer;width:20px;height:20px;';
            return el;
        }

        // ─── Vehicle icon ─────────────────────────────────────────────
        function makeVehicleIcon(color, routeType, bearing, shortName) {
            const hex = '#' + (color || 'e53935').replace('#', '');
            const isTram = routeType === 0 || routeType === 11, isRail = routeType === 1 || routeType === 2;
            const label = shortName || '', border = isTram ? '#FF6F00' : isRail ? '#6A1B9A' : '#ffffff';
            const icon = isTram ? '🚋' : isRail ? '🚇' : '🚌', fsize = label.length > 2 ? '9' : '11';
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="42" viewBox="0 0 36 42">
                    <polygon points="18,0 24,10 12,10" fill="${hex}" opacity="0.95"/>
                    <rect x="2" y="9" width="32" height="26" rx="6" ry="6" fill="${hex}" stroke="${border}" stroke-width="2"/>
                    <text x="8" y="21" text-anchor="middle" font-size="9" font-family="Arial" fill="rgba(255,255,255,0.75)">${icon}</text>
                    <text x="20" y="27" text-anchor="middle" font-size="${fsize}" font-family="Arial,sans-serif" font-weight="bold"
                          fill="white" paint-order="stroke" stroke="rgba(0,0,0,0.3)" stroke-width="2">${label}</text>
                </svg>`;
            const el = document.createElement('div');
            el.innerHTML = svg;
            el.style.cssText = `cursor:pointer;width:36px;height:42px;transform:rotate(${bearing || 0}deg);transform-origin:18px 21px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));`;
            return el;
        }

        // ─── renderStops ──────────────────────────────────────────────
        function renderStops(stops) {
            stopMarkers.forEach(m => m.remove()); stopMarkers = [];
            stops.forEach(s => {
                const el = makeStopIcon(s.routeType ?? 3);
                el.addEventListener('click', e => {
                    _suppressMapClick = true;
                    openSheet(s.stopId, s.name, s.routeType ?? 3);
                });
                stopMarkers.push(new maplibregl.Marker({ element: el, anchor: 'center' }).setLngLat([s.lon, s.lat]).addTo(map));
            });
        }

        // ─── Stop schedule sheet ──────────────────────────────────────
        const sheet = document.getElementById('stop-sheet');
        const sheetName = document.getElementById('sheet-stop-name');
        const sheetSid = document.getElementById('sheet-stop-id');
        const sheetDate = document.getElementById('sheet-date');
        const sheetLoad = document.getElementById('sheet-loading');
        const sheetMpty = document.getElementById('sheet-empty');
        const sheetBody = document.getElementById('sheet-body');
        document.getElementById('sheet-close').addEventListener('click', e => { e.stopPropagation(); closeSheet(); });
        sheet.addEventListener('click', e => e.stopPropagation());
        let currentStopId = null;

        function openSheet(stopId, stopName, stopRouteType) {
            currentStopId = stopId;
            sheetName.textContent = stopName;
            const isTram = stopRouteType === 0 || stopRouteType === 11;
            sheetSid.textContent = (isTram ? '🚋 ' : '🚌 ') + '#' + stopId;
            const now = new Date();
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            sheetDate.textContent = days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
            sheetLoad.style.display = 'flex';
            sheetMpty.style.display = 'none';
            sheetBody.innerHTML = '';
            sheet.classList.add('open');
            window._pendingMsg = 'stopSchedule:' + stopId;
        }

        function closeSheet() { sheet.classList.remove('open'); currentStopId = null; }

        // ─── renderStopSchedule (called from C#) ──────────────────────
        function renderStopSchedule(data) {
            if (typeof data === 'string') data = JSON.parse(data);
            // Always render — currentStopId may have changed due to map click
            // but the sheet is still showing the correct stop
            sheetLoad.style.display = 'none';
            sheetBody.innerHTML = '';
            const groups = data.groups || [];
            if (groups.length === 0) { sheetMpty.style.display = 'block'; return; }

            groups.forEach((g, gi) => {
                const rType = routeTypeMap[g.routeId] ?? 3;
                const pillClass = rType === 0 || rType === 11 ? 'tram' : rType === 1 || rType === 2 ? 'rail' : 'bus';
                const deps = g.departures || [];

                const timesHtml = deps.map((d, i) => {
                    const isNext = i === 0;
                    let chipClass = 'time-chip' + (isNext ? ' next' : '');

                    // hasEta = we have a predicted time different from scheduled
                    // (can come from IsScheduledOnly TripUpdate too, not just GPS vehicles)
                    const hasEta = d.estimatedTime && d.estimatedTime !== d.scheduledTime;

                    if (hasEta) {
                        const delay = d.delayMinutes ?? 0;
                        let badge = '';
                        if (delay > 1) badge = `<span class="delay-badge late">+${delay}'</span>`;
                        else if (delay < -1) badge = `<span class="delay-badge early">${delay}'</span>`;
                        else badge = `<span class="delay-badge ontime">✓</span>`;
                        // GPS-tracked vehicles get a live dot too
                        const livePin = d.isTracked ? `<span class="live-dot">●</span>` : '';
                        return `<span class="${chipClass}"><span class="sched-strike">${d.scheduledTime}</span><span class="eta-time">${d.estimatedTime}</span>${badge}${livePin}</span>`;
                    } else if (d.isTracked) {
                        // GPS tracked, on schedule (no ETA deviation)
                        return `<span class="${chipClass}">${d.scheduledTime}<span class="live-dot">●</span></span>`;
                    } else {
                        // Static schedule only
                        return `<span class="${chipClass}">${d.scheduledTime}</span>`;
                    }
                }).join('');

                const trackedCount = deps.filter(d => d.isTracked).length;
                const etaCount = deps.filter(d => d.estimatedTime && d.estimatedTime !== d.scheduledTime).length;
                const rtBadge = trackedCount > 0 ? `&nbsp;<span class="tracked-count">📡&nbsp;${trackedCount}</span>`
                    : etaCount > 0 ? `&nbsp;<span class="tracked-count" style="color:#ff9800">⏱&nbsp;${etaCount}</span>` : '';
                const countHtml = deps.length + '&nbsp;dep.' + rtBadge;

                const div = document.createElement('div');
                div.className = 'route-group' + (gi === 0 ? ' expanded' : '');
                div.innerHTML = `
                        <div class="route-group-header" onclick="this.parentElement.classList.toggle('expanded')">
                            <span class="route-pill ${pillClass}">${escHtml(g.shortName)}</span>
                            <span class="route-headsign">${escHtml(g.headsign)}</span>
                            <span class="route-count">${countHtml}</span>
                            <span class="route-chevron">▾</span>
                        </div>
                        <div class="route-times">${timesHtml}</div>`;
                sheetBody.appendChild(div);
            });

            requestAnimationFrame(() => {
                const next = sheetBody.querySelector('.time-chip.next');
                if (next) next.scrollIntoView({ block: 'nearest' });
            });
        }

        function escHtml(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        // ─── renderRoutes ─────────────────────────────────────────────
        function renderRoutes(routes) {
            clearActiveRoute();
            routeColorMap = {}; routeNameMap = {}; routeTypeMap = {}; routeShapeMap = {};
            routes.forEach(r => {
                routeColorMap[r.routeId] = typeColor(r.routeType);
                routeNameMap[r.routeId] = r.shortName || r.routeId;
                routeTypeMap[r.routeId] = r.routeType ?? 3;
                if (r.shape && r.shape.length >= 2) routeShapeMap[r.routeId] = r.shape;
            });
        }

        // ─── Route line ───────────────────────────────────────────────
        function showRoute(routeId) {
            clearActiveRoute();
            const shape = routeShapeMap[routeId];
            if (!shape || shape.length < 2) return;
            const color = '#' + (routeColorMap[routeId] || '1565c0');
            map.addSource('active-route', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: shape } } });
            map.addLayer({ id: 'active-route-outline', type: 'line', source: 'active-route', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': '#000000', 'line-width': 9, 'line-opacity': 0.15 } });
            map.addLayer({ id: 'active-route', type: 'line', source: 'active-route', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': color, 'line-width': 5, 'line-opacity': 0.95 } });
            activeRouteId = routeId;
        }

        function clearActiveRoute() {
            try {
                if (map.getLayer('active-route-outline')) map.removeLayer('active-route-outline');
                if (map.getLayer('active-route')) map.removeLayer('active-route');
                if (map.getSource('active-route')) map.removeSource('active-route');
            } catch (e) { }
            activeRouteId = null;
        }

        function typeColor(t) {
            if (t === 0) return 'e53935';
            if (t === 11) return 'e65100';
            if (t === 1 || t === 2) return '6a1b9a';
            return '1565c0';
        }

        // ─── renderVehicles ───────────────────────────────────────────
        let vehiclePopup = new maplibregl.Popup({ closeButton: true, offset: 18 });

        function renderVehicles(vehicles) {
            const seen = new Set();
            vehicles.forEach(v => {
                seen.add(v.vehicleId);
                const rId = v.routeId || '', rType = routeTypeMap[rId] ?? v.routeType ?? 3;
                const color = typeColor(rType), sName = routeNameMap[rId] || rId || '';
                if (vehicleMarkers[v.vehicleId]) {
                    const entry = vehicleMarkers[v.vehicleId];
                    entry.marker.setLngLat([v.lon, v.lat]); entry.routeId = rId;
                    const domEl = entry.marker.getElement();
                    const tmp = makeVehicleIcon(color, rType, v.bearing, sName);
                    domEl.innerHTML = tmp.innerHTML; domEl.style.cssText = tmp.style.cssText;
                    domEl.onclick = null; attachVehicleClick(domEl, v, color, rId);
                } else {
                    const el = makeVehicleIcon(color, rType, v.bearing, sName);
                    attachVehicleClick(el, v, color, rId);
                    const marker = new maplibregl.Marker({ element: el, anchor: 'center' }).setLngLat([v.lon, v.lat]).addTo(map);
                    vehicleMarkers[v.vehicleId] = { marker, routeId: rId };
                }
            });
            for (const id in vehicleMarkers) {
                if (!seen.has(id)) { vehicleMarkers[id].marker.remove(); delete vehicleMarkers[id]; }
            }
        }

        function attachVehicleClick(el, v, color, rId) {
            el.addEventListener('click', e => {
                e.stopPropagation(); _suppressMapClick = true;
                closeSheet(); showRoute(rId);
                const hex = '#' + color.replace('#', ''), name = routeNameMap[rId] || rId || '';
                vehiclePopup.setLngLat([v.lon, v.lat])
                    .setHTML(`<div class="vehicle-popup">
                            <span class="route-badge" style="background:${hex}">Line ${name}</span>
                            ${v.label ? `<div class="info">Vehicle: ${v.label}</div>` : ''}
                            <div class="info">Route: ${name}</div>
                        </div>`).addTo(map);
            });
        }

        function clearVehicles() {
            Object.values(vehicleMarkers).forEach(e => e.marker.remove());
            vehicleMarkers = {}; clearActiveRoute(); vehiclePopup.remove();
        }

        // ─── Map click ────────────────────────────────────────────────
        map.on('click', () => {
            if (_suppressMapClick) { _suppressMapClick = false; return; }
            clearActiveRoute(); vehiclePopup.remove();
            // Only close sheet if it's showing a vehicle popup area, not a stop schedule
            // Sheet is closed by the X button, swipe, or tapping a vehicle marker
        });

        // ─── Swipe down to close sheet ────────────────────────────────
        let touchStartY = 0;
        sheet.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
        sheet.addEventListener('touchend', e => { if (e.changedTouches[0].clientY - touchStartY > 80) closeSheet(); }, { passive: true });
    </script>
</body>
</html>
