<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body, #map {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script>

        // ── Load zetko's mapstyle, strip the transit stop icon layers,
        //    then init the map.  We remove only 'Transit' and
        //    'Transit tunnel' — everything else (roads, tram tracks,
        //    bridges) stays exactly as zetko has it.
        (async () => {

            const style = await fetch('mapstyle.json').then(r => r.json());

            const REMOVE = new Set(['Transit', 'Transit tunnel', 'Station labels']);
            style.layers = style.layers.filter(l => !REMOVE.has(l.id));

            window.map = new maplibregl.Map({
                container: 'map',
                style:     style,
                center:    [15.9775, 45.8129],   // Zagreb
                zoom:      13,
                minZoom:   3,
                maxPitch:  60
            });

            map.addControl(new maplibregl.NavigationControl(), 'top-right');

            map.on('load', () => {
                console.log('[GetThere] Map ready');
                // Brick 2 will add stops, vehicles etc here
            });

        })();

    </script>
</body>
</html>
