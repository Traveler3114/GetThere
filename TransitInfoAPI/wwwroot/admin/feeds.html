<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Feeds - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <nav class="mb-4"><a href="/" class="text-decoration-none">&larr; Home</a> &gt; <a href="/admin/" class="text-decoration-none">Admin</a></nav>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Feeds</h1>
    <div>
      <button class="btn btn-success btn-sm" onclick="showAddModal()"><i class="bi bi-plus-lg"></i> Add Feed</button>
      <button class="btn btn-outline-primary btn-sm" onclick="loadFeeds()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
    </div>
  </div>

  <div id="loading" class="text-center py-4 text-muted"><i class="bi bi-hourglass-split"></i> Loading...</div>
  <div id="error" class="alert alert-danger d-none"></div>
  <div id="content" class="d-none"></div>
</div>

<script>
const BASE = '';
let allFeeds = [];

async function loadFeeds() {
  document.getElementById('loading').classList.remove('d-none');
  document.getElementById('error').classList.add('d-none');
  document.getElementById('content').classList.add('d-none');
  try {
    const r = await fetch(BASE + '/feeds');
    const j = await r.json();
    allFeeds = j.data || [];
    renderFeeds();
    document.getElementById('loading').classList.add('d-none');
    document.getElementById('content').classList.remove('d-none');
  } catch(e) {
    document.getElementById('loading').classList.add('d-none');
    showError('Failed to load feeds: ' + e.message);
  }
}

function renderFeeds() {
  if (!allFeeds.length) {
    document.getElementById('content').innerHTML = '<div class="alert alert-info">No feeds configured.</div>';
    return;
  }
  const rows = allFeeds.map(f => `<tr>
    <td>${esc(f.feedId)}</td>
    <td><span class="badge bg-info text-dark">${esc(f.feedType)}</span></td>
    <td>${esc(f.operatorName||'-')}</td>
    <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><a href="${esc(f.externalUrl||'#')}" target="_blank" class="text-decoration-none small">${esc(f.externalUrl||'-')}</a></td>
    <td>${f.isActive ? '<span class="badge bg-success">Active</span>' : '<span class="badge bg-secondary">Inactive</span>'}</td>
    <td class="small">${f.lastFetched ? new Date(f.lastFetched).toLocaleString() : '-'}</td>
    <td>${f.refreshIntervalSeconds}s</td>
    <td>
      ${f.feedType === 'GTFSStatic' ? `<button class="btn btn-sm btn-outline-success" onclick="importFeed(${f.id})" title="Import"><i class="bi bi-download"></i></button>` : ''}
      ${f.lastFetched ? `<button class="btn btn-sm btn-outline-info" onclick="reconcileFeed(${f.id})" title="Reconcile"><i class="bi bi-arrow-left-right"></i></button>` : ''}
      <button class="btn btn-sm btn-outline-warning" onclick="toggleActive(${f.id}, ${!f.isActive})" title="Toggle active"><i class="bi bi-power"></i></button>
      <button class="btn btn-sm btn-outline-danger" onclick="deleteFeed(${f.id})" title="Delete"><i class="bi bi-trash"></i></button>
    </td>
  </tr>`).join('');
  document.getElementById('content').innerHTML = `<div class="table-responsive"><table class="table table-striped table-hover"><thead class="table-dark"><tr><th>Feed ID</th><th>Type</th><th>Operator</th><th>External URL</th><th>Status</th><th>Last Fetched</th><th>Interval</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div><small class="text-muted">${allFeeds.length} feed(s)</small>`;
}

async function toggleActive(id, active) {
  try {
    const feed = allFeeds.find(f => f.id === id);
    if (!feed) return;
    const r = await fetch(BASE + '/feeds/' + id, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({...feed, isActive: active})
    });
    const j = await r.json();
    if (j.success) { loadFeeds(); } else { showError(j.message || 'Failed to update feed.'); }
  } catch(e) { showError('Error: ' + e.message); }
}

async function deleteFeed(id) {
  if (!confirm('Delete this feed?')) return;
  try {
    const r = await fetch(BASE + '/feeds/' + id, { method: 'DELETE' });
    const j = await r.json();
    if (j.success) { loadFeeds(); } else { showError(j.message || 'Failed to delete feed.'); }
  } catch(e) { showError('Error: ' + e.message); }
}

async function showAddModal() {
  let operators = [];
  try {
    const r = await fetch(BASE + '/operators');
    const j = await r.json();
    operators = j.data || [];
  } catch(e) {}

  const opOptions = operators.map(o => `<option value="${o.id}">${esc(o.name)} (${esc(o.globalId)})</option>`).join('');
  const html = `<div class="modal fade" id="addModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Add Feed</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="mb-3">
        <label class="form-label">Operator</label>
        <select id="addOperatorId" class="form-select form-select-sm">${opOptions}</select>
      </div>
      <div class="mb-3">
        <label class="form-label">Feed Type</label>
        <select id="addFeedType" class="form-select form-select-sm">
          <option value="GTFSStatic">GTFS Static</option>
          <option value="GTFSRealtime">GTFS Realtime</option>
          <option value="GBFS">GBFS</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Source Type</label>
        <select id="addSourceType" class="form-select form-select-sm">
          <option value="External">External</option>
          <option value="Internal">Internal</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Feed ID</label>
        <input type="text" id="addFeedId" class="form-control form-control-sm" value="feed-${Date.now()}">
      </div>
      <div class="mb-3">
        <label class="form-label">External URL</label>
        <input type="url" id="addExternalUrl" class="form-control form-control-sm" placeholder="https://...">
      </div>
      <div class="mb-3">
        <label class="form-label">Refresh Interval (seconds)</label>
        <input type="number" id="addInterval" class="form-control form-control-sm" value="3600">
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
      <button type="button" class="btn btn-primary" onclick="addFeed()">Add Feed</button>
    </div>
  </div></div></div>`;
  const existing = document.getElementById('addModal');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', html);
  const modal = new bootstrap.Modal(document.getElementById('addModal'));
  modal.show();
  document.getElementById('addModal').addEventListener('hidden.bs.modal', () => document.getElementById('addModal').remove());
}

async function addFeed() {
  const operatorId = parseInt(document.getElementById('addOperatorId').value);
  const feedType = document.getElementById('addFeedType').value;
  const sourceType = document.getElementById('addSourceType').value;
  const feedId = document.getElementById('addFeedId').value.trim();
  const externalUrl = document.getElementById('addExternalUrl').value.trim();
  const interval = parseInt(document.getElementById('addInterval').value) || 3600;
  if (!feedId) { alert('Feed ID is required.'); return; }
  try {
    const params = new URLSearchParams({operatorId, feedType, sourceType, feedId, refreshIntervalSeconds: interval});
    if (externalUrl) params.set('externalUrl', externalUrl);
    const r = await fetch(BASE + '/feeds?' + params.toString(), { method: 'POST' });
    const j = await r.json();
    if (j.success) {
      bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
      loadFeeds();
    } else {
      alert(j.message || 'Failed to add feed.');
    }
  } catch(e) { alert('Error: ' + e.message); }
}

function showError(msg) { const e = document.getElementById('error'); e.textContent = msg; e.classList.remove('d-none'); }
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

async function importFeed(id) {
  if (!confirm('Import this feed now?')) return;
  const btn = event?.target?.closest('button');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>'; }
  try {
    const r = await fetch(BASE + '/feeds/' + id + '/import', { method: 'POST' });
    const j = await r.json();
    if (j.success) {
      loadFeeds();
    } else {
      showError(j.message || 'Import failed.');
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-download"></i>'; }
    }
  } catch(e) {
    showError('Error: ' + e.message);
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-download"></i>'; }
  }
}

async function reconcileFeed(id) {
  if (!confirm('Reconcile stops for this feed?')) return;
  const btn = event?.target?.closest('button');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>'; }
  try {
    const r = await fetch(BASE + '/feeds/' + id + '/reconcile', { method: 'POST' });
    const j = await r.json();
    if (j.success) {
      alert(j.message);
      loadFeeds();
    } else {
      showError(j.message || 'Reconciliation failed.');
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-arrow-left-right"></i>'; }
    }
  } catch(e) {
    showError('Error: ' + e.message);
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-arrow-left-right"></i>'; }
  }
}

loadFeeds();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
