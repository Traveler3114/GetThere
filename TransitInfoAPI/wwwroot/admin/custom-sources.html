<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Custom Sources - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <nav class="mb-4"><a href="/" class="text-decoration-none">&larr; Home</a> &gt; <a href="/admin/" class="text-decoration-none">Admin</a></nav>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Custom Sources</h1>
    <div>
      <button class="btn btn-success btn-sm" onclick="location.href='/admin/custom-source-editor.html?new'"><i class="bi bi-plus-lg"></i> Add Custom Source</button>
      <button class="btn btn-outline-primary btn-sm" onclick="loadSources()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
    </div>
  </div>

  <div id="loading" class="text-center py-4 text-muted"><i class="bi bi-hourglass-split"></i> Loading...</div>
  <div id="error" class="alert alert-danger d-none"></div>
  <div id="content" class="d-none"></div>
  <div id="pagination" class="d-none"></div>
  <div id="statusBar" class="small text-muted mt-2 d-none"></div>
</div>

<script>
const BASE = '';
let allSources = [];
let currentPage = 1;
const pageSize = 25;

function showPage(page) {
  currentPage = page;
  const start = (currentPage - 1) * pageSize;
  const pageData = paginatedItems.slice(start, start + pageSize);
  const totalPages = Math.ceil(paginatedItems.length / pageSize) || 1;
  renderTable(pageData);
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1 && paginatedItems.length <= pageSize) { el.classList.add('d-none'); return; }
  el.classList.remove('d-none');
  let pages = [];
  for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) pages.push(i);
  el.innerHTML = `<nav><ul class="pagination pagination-sm justify-content-center mt-2">
    <li class="page-item ${currentPage <= 1 ? 'disabled' : ''}"><button class="page-link" onclick="showPage(${currentPage - 1})">Previous</button></li>
    ${currentPage > 3 ? '<li class="page-item disabled"><span class="page-link">...</span></li>' : ''}
    ${pages.map(p => `<li class="page-item ${p === currentPage ? 'active' : ''}"><button class="page-link" onclick="showPage(${p})">${p}</button></li>`).join('')}
    ${currentPage < totalPages - 2 ? '<li class="page-item disabled"><span class="page-link">...</span></li>' : ''}
    <li class="page-item ${currentPage >= totalPages ? 'disabled' : ''}"><button class="page-link" onclick="showPage(${currentPage + 1})">Next</button></li>
  </ul><small class="text-muted d-block text-center">Page ${currentPage} of ${totalPages} (${paginatedItems.length} items)</small></nav>`;
}

function renderTable(list) {
  if (!list.length) {
    document.getElementById('content').innerHTML = '<div class="alert alert-info">No custom sources configured.</div>';
    return;
  }
  const rows = list.map(s => {
    const statusBadge = s.lastRunStatus
      ? `<span class="badge bg-${s.lastRunStatus === 'Success' ? 'success' : s.lastRunStatus === 'Failed' ? 'danger' : s.lastRunStatus === 'Running' ? 'primary' : 'secondary'}">${esc(s.lastRunStatus)}</span>`
      : '<span class="badge bg-secondary">Never</span>';
    const activeBadge = s.isActive
      ? '<span class="badge bg-success">Active</span>'
      : '<span class="badge bg-danger">Inactive</span>';
    const lastRun = s.lastRunAt ? new Date(s.lastRunAt).toLocaleString() : '-';
    return `<tr>
      <td>${s.id}</td>
      <td><a href="/admin/custom-source-editor.html?id=${s.id}">${esc(s.name)}</a></td>
      <td>${esc(s.operatorName)}</td>
      <td>${outputBadge(s.outputFormat)}</td>
      <td>${respBadge(s.responseFormat)}</td>
      <td>${lastRun}</td>
      <td>${statusBadge}</td>
      <td>${activeBadge}</td>
      <td class="text-nowrap">
        <button class="btn btn-outline-primary btn-sm" onclick="editSource(${s.id})" title="Edit"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-outline-success btn-sm" onclick="runNow(${s.id})" title="Run Now"><i class="bi bi-play-fill"></i></button>
        <button class="btn btn-outline-info btn-sm" onclick="viewRuns(${s.id})" title="Run History"><i class="bi bi-clock-history"></i></button>
        <button class="btn btn-outline-danger btn-sm" onclick="deleteSource(${s.id})" title="Delete"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`;
  }).join('');
  document.getElementById('content').innerHTML = `<div class="table-responsive"><table class="table table-striped table-hover"><thead class="table-dark"><tr>
    <th>ID</th><th>Name</th><th>Operator</th><th>Output</th><th>Response</th><th>Last Run</th><th>Status</th><th>Active</th><th>Actions</th>
  </tr></thead><tbody>${rows}</tbody></table></div>`;
}

function outputBadge(fmt) {
  const colors = { GtfsStatic: 'warning', GtfsRealtime: 'info', Gbfs: 'success' };
  return `<span class="badge bg-${colors[fmt] || 'secondary'}">${esc(fmt)}</span>`;
}

function respBadge(fmt) {
  const colors = { JSON: 'primary', XML: 'dark', CSV: 'secondary' };
  return `<span class="badge bg-${colors[fmt] || 'secondary'}">${esc(fmt)}</span>`;
}

async function loadSources() {
  document.getElementById('loading').classList.remove('d-none');
  document.getElementById('error').classList.add('d-none');
  document.getElementById('content').classList.add('d-none');
  document.getElementById('statusBar').classList.add('d-none');
  try {
    const r = await fetch(BASE + '/custom-feeds?perPage=500');
    if (!r.ok) { showError('Failed to load: ' + (r.statusText || 'Unknown error')); return; }
    const j = await r.json();
    allSources = j.data || [];
    paginatedItems = allSources;
    showPage(1);
    document.getElementById('loading').classList.add('d-none');
    document.getElementById('content').classList.remove('d-none');
    document.getElementById('statusBar').classList.remove('d-none');
    document.getElementById('statusBar').textContent = `Loaded ${allSources.length} custom source(s)`;
  } catch(e) {
    document.getElementById('loading').classList.add('d-none');
    showError('Failed to load custom sources: ' + e.message);
  }
}

function editSource(id) {
  location.href = '/admin/custom-source-editor.html?id=' + id;
}

async function runNow(id) {
  if (!confirm('Run this custom source now?')) return;
  try {
    const r = await fetch(BASE + '/custom-feeds/' + id + '/execute', { method: 'POST' });
    if (!r.ok) { alert('Failed to start run'); return; }
    const run = await r.json();
    alert('Run started (ID: ' + run.id + '). Check run history for results.');
    loadSources();
  } catch(e) { alert('Error: ' + e.message); }
}

function viewRuns(id) {
  location.href = '/admin/custom-source-runs.html?feedId=' + id;
}

async function deleteSource(id) {
  if (!confirm('Delete this custom source? ' + (allSources.find(s => s.id === id)?.lastRunStatus ? 'It has run history and will be deactivated (soft delete).' : 'No run history — it will be permanently deleted.'))) return;
  try {
    const r = await fetch(BASE + '/custom-feeds/' + id, { method: 'DELETE' });
    if (r.ok) { loadSources(); } else { alert('Delete failed'); }
  } catch(e) { alert('Error: ' + e.message); }
}

function showError(msg) { const e = document.getElementById('error'); e.textContent = msg; e.classList.remove('d-none'); }
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

let paginatedItems = [];
loadSources();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
