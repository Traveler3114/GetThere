<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Run History - Custom Source - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
<script src="/admin/admin-auth.js"></script>
</head>
<body>
<div class="container">
  <nav class="mb-4"><a href="/" class="text-decoration-none">&larr; Home</a> &gt; <a href="/admin/" class="text-decoration-none">Admin</a> &gt; <a href="/admin/custom-sources.html" class="text-decoration-none">Custom Sources</a></nav>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Run History: <span id="feedName">...</span></h1>
    <div>
      <button class="btn btn-success btn-sm" onclick="runNow()"><i class="bi bi-play-fill"></i> Run Now</button>
      <button class="btn btn-outline-primary btn-sm" onclick="loadRuns()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
    </div>
  </div>

  <div id="loading" class="text-center py-4 text-muted"><i class="bi bi-hourglass-split"></i> Loading...</div>
  <div id="error" class="alert alert-danger d-none"></div>
  <div id="content" class="d-none"></div>
  <div id="pagination" class="d-none"></div>
</div>

<script>
const BASE = '';
let feedId = null;
let allRuns = [];
let currentPage = 1;
const pageSize = 20;
let pollTimer = null;
let pollStartTime = null;
const POLL_TIMEOUT_MS = 5 * 60 * 1000; // 5 minutes

function showPage(page) {
  currentPage = page;
  const start = (currentPage - 1) * pageSize;
  const pageData = paginatedItems.slice(start, start + pageSize);
  const totalPages = Math.ceil(paginatedItems.length / pageSize) || 1;
  renderTable(pageData);
  renderPagination(totalPages);
  startPollingIfRunning();
}

function renderPagination(totalPages) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1 && paginatedItems.length <= pageSize) { el.classList.add('d-none'); return; }
  el.classList.remove('d-none');
  let pages = [];
  for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) pages.push(i);
  el.innerHTML = `<nav><ul class="pagination pagination-sm justify-content-center mt-2">
    <li class="page-item ${currentPage <= 1 ? 'disabled' : ''}"><button class="page-link" onclick="showPage(${currentPage - 1})">Previous</button></li>
    ${currentPage > 3 ? '<li class="page-item disabled"><span class="page-link">...</span></li>' : ''}
    ${pages.map(p => `<li class="page-item ${p === currentPage ? 'active' : ''}"><button class="page-link" onclick="showPage(${p})">${p}</button></li>`).join('')}
    ${currentPage < totalPages - 2 ? '<li class="page-item disabled"><span class="page-link">...</span></li>' : ''}
    <li class="page-item ${currentPage >= totalPages ? 'disabled' : ''}"><button class="page-link" onclick="showPage(${currentPage + 1})">Next</button></li>
  </ul><small class="text-muted d-block text-center">Page ${currentPage} of ${totalPages} (${paginatedItems.length} runs)</small></nav>`;
}

function renderTable(list) {
  if (!list.length) {
    document.getElementById('content').innerHTML = '<div class="alert alert-info">No runs yet.</div>';
    return;
  }
  const rows = list.map(r => {
    const statusBadge = r.status === 'Success' ? 'bg-success' : r.status === 'Failed' ? 'bg-danger' : r.status === 'Running' ? 'bg-primary' : 'bg-secondary';
    const logText = r.logText ? r.logText.replace(/\n/g, '<br>') : '-';
    return `<tr>
      <td>${r.id}</td>
      <td>${new Date(r.startedAt).toLocaleString()}</td>
      <td>${r.completedAt ? new Date(r.completedAt).toLocaleString() : '-'}</td>
      <td><span class="badge ${statusBadge}">${esc(r.status)}</span></td>
      <td>${r.recordsProduced}</td>
      <td><button class="btn btn-sm btn-outline-secondary" onclick="toggleLog(${r.id})">Toggle Log</button></td>
    </tr>
    <tr id="logRow_${r.id}" class="d-none"><td colspan="6"><pre class="mb-0 p-2 bg-light border" style="max-height:300px;overflow:auto;font-size:0.85rem;white-space:pre-wrap;">${logText}</pre></td></tr>`;
  }).join('');
  document.getElementById('content').innerHTML = `<div class="table-responsive"><table class="table table-striped table-hover"><thead class="table-dark"><tr>
    <th>ID</th><th>Started</th><th>Completed</th><th>Status</th><th>Records</th><th>Log</th>
  </tr></thead><tbody>${rows}</tbody></table></div>`;
}

function toggleLog(id) {
  const row = document.getElementById('logRow_' + id);
  if (row) row.classList.toggle('d-none');
}

async function loadRuns() {
  document.getElementById('loading').classList.remove('d-none');
  document.getElementById('error').classList.add('d-none');
  document.getElementById('content').classList.add('d-none');
  try {
    const r = await fetch(BASE + '/custom-feeds/' + feedId + '/runs?perPage=500');
    if (!r.ok) { showError('Failed to load runs: ' + (r.statusText || 'Unknown error')); return; }
    const j = await r.json();
    allRuns = j.data || [];
    paginatedItems = allRuns;
    showPage(1);
    document.getElementById('loading').classList.add('d-none');
    document.getElementById('content').classList.remove('d-none');
  } catch(e) {
    document.getElementById('loading').classList.add('d-none');
    showError('Failed to load runs: ' + e.message);
  }
}

function startPollingIfRunning() {
  stopPolling();
  const hasRunning = allRuns.some(r => r.status === 'Running');
  if (!hasRunning) return;
  pollStartTime = Date.now();
  pollTimer = setInterval(async () => {
    if (Date.now() - pollStartTime > POLL_TIMEOUT_MS) {
      stopPolling();
      const bar = document.getElementById('statusBar');
      if (bar) {
        bar.textContent = 'This run is taking longer than expected — refresh manually.';
        bar.classList.remove('d-none');
      }
      return;
    }
    await loadRuns();
  }, 5000);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function runNow() {
  if (!confirm('Run this custom source now?')) return;
  try {
    const r = await fetch(BASE + '/custom-feeds/' + feedId + '/execute', { method: 'POST' });
    if (!r.ok) { alert('Failed to start run'); return; }
    const run = await r.json();
    alert('Run started (ID: ' + run.id + '). Auto-refreshing...');
    loadRuns();
  } catch(e) { alert('Error: ' + e.message); }
}

function showError(msg) {
  const e = document.getElementById('error');
  if (e) { e.textContent = msg; e.classList.remove('d-none'); }
}
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

let paginatedItems = [];
const params = new URLSearchParams(location.search);
feedId = params.get('feedId');
if (feedId) {
  loadRuns();
} else {
  document.getElementById('loading').classList.add('d-none');
  showError('No feed ID specified. Use ?feedId=N in the URL.');
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
