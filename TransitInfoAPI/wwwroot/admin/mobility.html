<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mobility - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <nav class="mb-4"><a href="/" class="text-decoration-none">&larr; Home</a> &gt; <a href="/admin/" class="text-decoration-none">Admin</a></nav>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Mobility Stations</h1>
    <div>
      <div class="btn-group btn-group-sm" role="group">
        <input type="radio" class="btn-check" name="viewToggle" id="viewTable" checked onchange="renderMobility()">
        <label class="btn btn-outline-secondary" for="viewTable"><i class="bi bi-table"></i></label>
        <input type="radio" class="btn-check" name="viewToggle" id="viewCards" onchange="renderMobility()">
        <label class="btn btn-outline-secondary" for="viewCards"><i class="bi bi-grid"></i></label>
      </div>
      <button class="btn btn-outline-primary btn-sm ms-2" onclick="loadMobility()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
      <select class="form-select form-select-sm d-inline-block ms-2" style="width:auto" onchange="pageSize=parseInt(this.value);showPage(1)">
        <option value="25">25 per page</option>
        <option value="50" selected>50 per page</option>
        <option value="100">100 per page</option>
        <option value="200">200 per page</option>
      </select>
    </div>
  </div>

  <div id="loading" class="text-center py-4 text-muted"><i class="bi bi-hourglass-split"></i> Loading...</div>
  <div id="error" class="alert alert-danger d-none"></div>
  <div id="content" class="d-none"></div>
  <div id="pagination" class="d-none"></div>
</div>

<script>
const BASE = '';
let allStations = [];

async function loadMobility() {
  document.getElementById('loading').classList.remove('d-none');
  document.getElementById('error').classList.add('d-none');
  document.getElementById('content').classList.add('d-none');
  try {
    const r = await fetch(BASE + '/mobility/stations');
    if (!r.ok) { showError('Failed to load: ' + (r.statusText || 'Unknown error')); return; }
    const j = await r.json();
    allStations = j.data || [];
    renderMobility();
    paginatedItems = allStations;
    showPage(1);
    document.getElementById('loading').classList.add('d-none');
    document.getElementById('content').classList.remove('d-none');
  } catch(e) {
    document.getElementById('loading').classList.add('d-none');
    showError('Failed to load mobility stations: ' + e.message);
  }
}

let currentPage = 1;
let pageSize = 50;
let paginatedItems = [];

function showPage(page) {
  currentPage = page;
  const start = (currentPage - 1) * pageSize;
  const pageData = paginatedItems.slice(start, start + pageSize);
  const totalPages = Math.ceil(paginatedItems.length / pageSize) || 1;
  renderMobilityPage(pageData);
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1 && paginatedItems.length <= pageSize) { el.classList.add('d-none'); return; }
  el.classList.remove('d-none');
  let pages = [];
  for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) pages.push(i);
  el.innerHTML = `<nav><ul class="pagination pagination-sm justify-content-center mt-2">
    <li class="page-item ${currentPage <= 1 ? 'disabled' : ''}"><button class="page-link" onclick="showPage(${currentPage - 1})">Previous</button></li>
    ${currentPage > 3 ? '<li class="page-item disabled"><span class="page-link">...</span></li>' : ''}
    ${pages.map(p => `<li class="page-item ${p === currentPage ? 'active' : ''}"><button class="page-link" onclick="showPage(${p})">${p}</button></li>`).join('')}
    ${currentPage < totalPages - 2 ? '<li class="page-item disabled"><span class="page-link">...</span></li>' : ''}
    <li class="page-item ${currentPage >= totalPages ? 'disabled' : ''}"><button class="page-link" onclick="showPage(${currentPage + 1})">Next</button></li>
  </ul><small class="text-muted d-block text-center">Page ${currentPage} of ${totalPages} (${paginatedItems.length} items)</small></nav>`;
}

function renderMobility() {
  paginatedItems = allStations;
  showPage(1);
}

function renderMobilityPage(list) {
  const isTable = document.getElementById('viewTable').checked;
  if (!list.length) {
    document.getElementById('content').innerHTML = '<div class="alert alert-info">No mobility stations found.</div>';
    return;
  }
  if (isTable) {
    const rows = list.map(s => `<tr>
      <td>${esc(s.name)}</td>
      <td>${esc(s.providerName)}</td>
      <td class="small">${s.latitude.toFixed(4)}, ${s.longitude.toFixed(4)}</td>
      <td>${s.availableVehicles} / ${s.capacity}</td>
      <td>
        <div class="capacity-bar"><div class="capacity-bar-fill" style="width:${s.capacity>0?(s.availableVehicles/s.capacity*100):0}%"></div></div>
        <small class="text-muted">${s.capacity>0 ? Math.round(s.availableVehicles/s.capacity*100) : 0}%</small>
      </td>
      <td><code>${esc(s.stationId)}</code></td>
    </tr>`).join('');
    document.getElementById('content').innerHTML = `<div class="table-responsive"><table class="table table-striped table-hover"><thead class="table-dark"><tr><th>Name</th><th>Provider</th><th>Location</th><th>Available</th><th>Utilization</th><th>Station ID</th></tr></thead><tbody>${rows}</tbody></table></div><small class="text-muted">${paginatedItems.length} station(s)</small>`;
  } else {
    const cards = list.map(s => {
      const pct = s.capacity > 0 ? Math.round(s.availableVehicles / s.capacity * 100) : 0;
      return `<div class="col-md-4 col-lg-3 mb-3"><div class="card h-100 shadow-sm">
        <div class="card-body">
          <h6 class="card-title mb-1">${esc(s.name)}</h6>
          <p class="card-text"><small class="text-muted">${esc(s.providerName)}</small></p>
          <div class="d-flex justify-content-between mb-1"><span class="small">${s.availableVehicles} / ${s.capacity} available</span><span class="small fw-bold">${pct}%</span></div>
          <div class="capacity-bar"><div class="capacity-bar-fill" style="width:${pct}%"></div></div>
          <p class="card-text mt-2"><small class="text-muted">${s.latitude.toFixed(4)}, ${s.longitude.toFixed(4)}</small></p>
        </div>
      </div></div>`;
    }).join('');
    document.getElementById('content').innerHTML = `<div class="row">${cards}</div><small class="text-muted mt-2 d-block">${paginatedItems.length} station(s)</small>`;
  }
}

function showError(msg) { const e = document.getElementById('error'); e.textContent = msg; e.classList.remove('d-none'); }
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

loadMobility();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
