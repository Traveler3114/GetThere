<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Routes - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <nav class="mb-4"><a href="/" class="text-decoration-none">&larr; Home</a> &gt; <a href="/admin/" class="text-decoration-none">Admin</a></nav>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Routes</h1>
    <button class="btn btn-outline-primary btn-sm" onclick="loadRoutes()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
  </div>

  <div class="row mb-3 g-2">
    <div class="col-auto">
      <select id="filterType" class="form-select form-select-sm" onchange="filterRoutes()">
        <option value="">All Types</option>
        <option value="Tram">Tram</option>
        <option value="Bus">Bus</option>
        <option value="Trolleybus">Trolleybus</option>
        <option value="Metro">Metro</option>
        <option value="Rail">Rail</option>
        <option value="Ferry">Ferry</option>
        <option value="Coach">Coach</option>
        <option value="CableCar">Cable Car</option>
        <option value="Funicular">Funicular</option>
      </select>
    </div>
    <div class="col-auto flex-grow-1">
      <input type="text" id="search" class="form-control form-control-sm" placeholder="Search by name..." oninput="filterRoutes()">
    </div>
  </div>

  <div id="loading" class="text-center py-4 text-muted"><i class="bi bi-hourglass-split"></i> Loading...</div>
  <div id="error" class="alert alert-danger d-none"></div>
  <div id="content" class="d-none"></div>
  <div id="pagination" class="d-none"></div>
</div>

<script>
const BASE = '';
let allRoutes = [];

async function loadRoutes() {
  document.getElementById('loading').classList.remove('d-none');
  document.getElementById('error').classList.add('d-none');
  document.getElementById('content').classList.add('d-none');
  try {
    const r = await fetch(BASE + '/routes');
    if (!r.ok) { showError('Failed to load: ' + (r.statusText || 'Unknown error')); return; }
    const j = await r.json();
    allRoutes = j.data || [];
    filterRoutes();
    paginatedItems = allRoutes;
    showPage(1);
    document.getElementById('loading').classList.add('d-none');
    document.getElementById('content').classList.remove('d-none');
  } catch(e) {
    document.getElementById('loading').classList.add('d-none');
    showError('Failed to load routes: ' + e.message);
  }
}

function filterRoutes() {
  const q = document.getElementById('search').value.toLowerCase();
  const type = document.getElementById('filterType').value;
  let filtered = allRoutes;
  if (q) filtered = filtered.filter(r => r.name.toLowerCase().includes(q) || (r.shortName||'').toLowerCase().includes(q));
  if (type) filtered = filtered.filter(r => r.routeType === type);
  paginatedItems = filtered;
  showPage(1);
}

let currentPage = 1;
const pageSize = 50;
let paginatedItems = [];

function showPage(page) {
  currentPage = page;
  const start = (currentPage - 1) * pageSize;
  const pageData = paginatedItems.slice(start, start + pageSize);
  const totalPages = Math.ceil(paginatedItems.length / pageSize) || 1;
  renderRoutes(pageData);
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1 && paginatedItems.length <= pageSize) { el.classList.add('d-none'); return; }
  el.classList.remove('d-none');
  let pages = [];
  for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) pages.push(i);
  el.innerHTML = `<nav><ul class="pagination pagination-sm justify-content-center mt-2">
    <li class="page-item ${currentPage <= 1 ? 'disabled' : ''}"><button class="page-link" onclick="showPage(${currentPage - 1})">Previous</button></li>
    ${currentPage > 3 ? '<li class="page-item disabled"><span class="page-link">...</span></li>' : ''}
    ${pages.map(p => `<li class="page-item ${p === currentPage ? 'active' : ''}"><button class="page-link" onclick="showPage(${p})">${p}</button></li>`).join('')}
    ${currentPage < totalPages - 2 ? '<li class="page-item disabled"><span class="page-link">...</span></li>' : ''}
    <li class="page-item ${currentPage >= totalPages ? 'disabled' : ''}"><button class="page-link" onclick="showPage(${currentPage + 1})">Next</button></li>
  </ul><small class="text-muted d-block text-center">Page ${currentPage} of ${totalPages} (${paginatedItems.length} items)</small></nav>`;
}

function renderRoutes(list) {
  if (!list.length) {
    document.getElementById('content').innerHTML = '<div class="alert alert-info">No routes found.</div>';
    return;
  }
  const rows = list.map(r => `<tr>
    <td>${esc(r.name)}</td>
    <td>${esc(r.shortName||'-')}</td>
    <td><span class="badge bg-secondary">${esc(r.routeType)}</span></td>
    <td>${esc(r.operatorName||'-')}</td>
    <td><code>${esc(r.globalId)}</code></td>
  </tr>`).join('');
  document.getElementById('content').innerHTML = `<div class="table-responsive"><table class="table table-striped table-hover"><thead class="table-dark"><tr><th>Name</th><th>Short Name</th><th>Type</th><th>Operator</th><th>Global ID</th></tr></thead><tbody>${rows}</tbody></table></div><small class="text-muted">${list.length} route(s)</small>`;
}

function showError(msg) { const e = document.getElementById('error'); e.textContent = msg; e.classList.remove('d-none'); }
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

loadRoutes();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
