<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Realtime - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <nav class="mb-4"><a href="/" class="text-decoration-none">&larr; Home</a> &gt; <a href="/admin/" class="text-decoration-none">Admin</a></nav>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div class="d-flex align-items-center gap-3">
      <h1 class="mb-0">Realtime Vehicles</h1>
      <span id="liveIndicator" class="small"><span class="live-dot"></span> Live</span>
    </div>
    <div>
      <button class="btn btn-outline-secondary btn-sm" id="pauseBtn" onclick="togglePause()"><i class="bi bi-pause-fill"></i> Pause</button>
      <button class="btn btn-outline-primary btn-sm" onclick="loadVehicles()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
    </div>
  </div>

  <div class="row mb-3 g-2">
    <div class="col-auto">
      <input type="text" id="filterOperator" class="form-control form-control-sm" placeholder="Filter by operator GlobalId..." oninput="filterVehicles()">
    </div>
    <div class="col-auto">
      <select id="refreshInterval" class="form-select form-select-sm" onchange="updateInterval()">
        <option value="5">5s</option>
        <option value="15" selected>15s</option>
        <option value="30">30s</option>
        <option value="60">60s</option>
      </select>
    </div>
  </div>

  <div id="loading" class="text-center py-4 text-muted"><i class="bi bi-hourglass-split"></i> Loading...</div>
  <div id="error" class="alert alert-danger d-none"></div>
  <div id="content" class="d-none"></div>
  <div id="statusBar" class="small text-muted mt-2 d-none"></div>
</div>

<script>
const BASE = '';
let allVehicles = [];
let paused = false;
let timer = null;
let intervalSec = 15;
let abortController = null;

async function loadVehicles() {
  if (paused) return;
  if (abortController) abortController.abort();
  abortController = new AbortController();
  document.getElementById('loading').classList.remove('d-none');
  document.getElementById('error').classList.add('d-none');
  try {
    const r = await fetch(BASE + '/realtime/vehicles', { signal: abortController.signal });
    const j = await r.json();
    allVehicles = j.data || [];
    document.getElementById('loading').classList.add('d-none');
    document.getElementById('content').classList.remove('d-none');
    document.getElementById('statusBar').classList.remove('d-none');
    filterVehicles();
    document.getElementById('statusBar').textContent = `Updated: ${new Date().toLocaleTimeString()} | ${allVehicles.length} vehicle(s) total`;
  } catch(e) {
    if (e.name === 'AbortError') return;
    document.getElementById('loading').classList.add('d-none');
    showError('Failed to load vehicles: ' + e.message);
  }
}

function filterVehicles() {
  const q = document.getElementById('filterOperator').value.toLowerCase();
  let filtered = allVehicles;
  if (q) filtered = filtered.filter(v => (v.routeId||'').toLowerCase().includes(q) || (v.tripId||'').toLowerCase().includes(q) || (v.vehicleId||'').toLowerCase().includes(q));
  renderVehicles(filtered);
}

function renderVehicles(list) {
  if (!list.length) {
    document.getElementById('content').innerHTML = '<div class="alert alert-info">No vehicles currently active.</div>';
    return;
  }
  const rows = list.map(v => `<tr>
    <td><code>${esc(v.vehicleId)}</code></td>
    <td>${esc(v.routeId||'-')}</td>
    <td>${esc(v.tripId||'-')}</td>
    <td class="small">${v.latitude.toFixed(4)}, ${v.longitude.toFixed(4)}</td>
    <td>${v.bearing != null ? v.bearing.toFixed(0) + '&deg;' : '-'}</td>
    <td class="small">${v.lastUpdated ? new Date(v.lastUpdated).toLocaleTimeString() : '-'}</td>
  </tr>`).join('');
  document.getElementById('content').innerHTML = `<div class="table-responsive"><table class="table table-striped table-hover table-sm"><thead class="table-dark"><tr><th>Vehicle ID</th><th>Route</th><th>Trip</th><th>Location</th><th>Bearing</th><th>Last Updated</th></tr></thead><tbody>${rows}</tbody></table></div><small class="text-muted">${list.length} vehicle(s) shown</small>`;
}

function togglePause() {
  paused = !paused;
  document.getElementById('pauseBtn').innerHTML = paused ? '<i class="bi bi-play-fill"></i> Resume' : '<i class="bi bi-pause-fill"></i> Pause';
  document.getElementById('liveIndicator').style.opacity = paused ? '0.5' : '1';
  if (!paused) loadVehicles();
}

function updateInterval() {
  intervalSec = parseInt(document.getElementById('refreshInterval').value);
  startTimer();
}

function startTimer() {
  if (timer) clearInterval(timer);
  timer = setInterval(loadVehicles, intervalSec * 1000);
}

function showError(msg) {
  if (!document.getElementById('content').classList.contains('d-none')) {
    // append to existing content
  }
  const e = document.getElementById('error');
  if (e) { e.textContent = msg; e.classList.remove('d-none'); }
}
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

loadVehicles();
startTimer();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
