<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reconciliation - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <nav class="mb-4"><a href="/" class="text-decoration-none">&larr; Home</a> &gt; <a href="/admin/" class="text-decoration-none">Admin</a></nav>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Reconciliation</h1>
    <div>
      <button class="btn btn-success btn-sm d-none" id="batchApproveBtn" onclick="batchApprove()"><i class="bi bi-check-all"></i> Approve Selected</button>
      <button class="btn btn-outline-primary btn-sm" onclick="loadAll()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
    </div>
  </div>

  <div class="row mb-3 g-2">
    <div class="col-auto">
      <select id="filterRouteType" class="form-select form-select-sm" onchange="filterItems()">
        <option value="">All Route Types</option>
        <option value="Bus">Bus</option>
        <option value="Tram">Tram</option>
        <option value="Metro">Metro</option>
        <option value="Rail">Rail</option>
        <option value="LightRail">Light Rail</option>
        <option value="Ferry">Ferry</option>
        <option value="CableCar">Cable Car</option>
        <option value="Gondola">Gondola</option>
        <option value="Funicular">Funicular</option>
        <option value="Trolleybus">Trolleybus</option>
      </select>
    </div>
    <div class="col-auto">
      <select id="filterStatus" class="form-select form-select-sm" onchange="filterItems()">
        <option value="">All Statuses</option>
        <option value="Pending">Pending</option>
        <option value="AutoMerged">Auto-Merged</option>
        <option value="ManuallyApproved">Approved</option>
        <option value="Rejected">Rejected</option>
      </select>
    </div>
  </div>

  <ul class="nav nav-tabs mb-3" id="tabBar">
    <li class="nav-item"><button class="nav-link active" data-tab="pending" onclick="switchTab('pending')">Pending</button></li>
    <li class="nav-item"><button class="nav-link" data-tab="merged" onclick="switchTab('merged')">Auto-Merged</button></li>
  </ul>

  <div id="loading" class="text-center py-4 text-muted"><i class="bi bi-hourglass-split"></i> Loading...</div>
  <div id="error" class="alert alert-danger d-none"></div>
  <div id="content" class="d-none"></div>
</div>

<script>
const BASE = '';
let pendingItems = [];
let mergedItems = [];
let currentTab = 'pending';

const ROUTE_COLORS = { Tram: '#33a02c', Metro: '#e31a1c', Rail: '#b15928', Bus: '#1f78b4', Ferry: '#33a02c', LightRail: '#ff7f00', CableCar: '#ff7f00', Gondola: '#6a3d9a', Funicular: '#b15928', Trolleybus: '#1f78b4' };

function rtBadge(type) {
  const color = ROUTE_COLORS[type] || '#888';
  return `<span class="rt-badge" style="background:${color}">${type || '-'}</span>`;
}

async function loadAll() {
  document.getElementById('loading').classList.remove('d-none');
  document.getElementById('error').classList.add('d-none');
  document.getElementById('content').classList.add('d-none');
  try {
    const pRResp = await fetch(BASE + '/reconciliation/pending');
    if (!pRResp.ok) { showError('Failed to load: ' + (pRResp.statusText || 'Unknown error')); return; }
    const pR = await pRResp.json();
    const mRResp = await fetch(BASE + '/reconciliation/auto-merged');
    if (!mRResp.ok) { showError('Failed to load: ' + (mRResp.statusText || 'Unknown error')); return; }
    const mR = await mRResp.json();
    pendingItems = pR.data || [];
    mergedItems = mR.data || [];
    renderCurrentTab();
    document.getElementById('loading').classList.add('d-none');
    document.getElementById('content').classList.remove('d-none');
  } catch(e) {
    document.getElementById('loading').classList.add('d-none');
    showError('Failed to load reconciliation data: ' + e.message);
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('#tabBar .nav-link').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  document.getElementById('batchApproveBtn').classList.toggle('d-none', tab !== 'pending');
  renderCurrentTab();
}

function filterItems() {
  renderCurrentTab();
}

function getFilteredPending() {
  const routeType = document.getElementById('filterRouteType').value;
  const status = document.getElementById('filterStatus').value;
  let filtered = pendingItems;
  if (routeType) filtered = filtered.filter(i => (i.rawRouteType || '').includes(routeType));
  if (status) filtered = filtered.filter(i => i.status === status);
  return filtered;
}

function getFilteredMerged() {
  const routeType = document.getElementById('filterRouteType').value;
  let filtered = mergedItems;
  if (routeType) filtered = filtered.filter(i => (i.rawRouteType || '').includes(routeType));
  return filtered;
}

function renderCurrentTab() {
  if (currentTab === 'pending') renderPending();
  else renderMerged();
}

function fmtDist(m) {
  if (m == null) return '-';
  if (m < 1000) return m.toFixed(0) + ' m';
  return (m / 1000).toFixed(2) + ' km';
}

function renderPending() {
  const filtered = getFilteredPending();
  if (!filtered.length) {
    document.getElementById('content').innerHTML = '<div class="alert alert-success"><i class="bi bi-check-circle"></i> No pending reconciliation items.</div>';
    return;
  }
  const cards = filtered.map(item => {
    const score = item.confidenceScore;
    const scorePct = (score * 100).toFixed(0);
    const scoreClass = score >= 0.8 ? 'bg-success' : score >= 0.5 ? 'bg-warning text-dark' : 'bg-danger';
    const hasStation = item.suggestedStationName;
    return `<div class="card mb-3 shadow-sm" id="rec-${item.id}">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-start">
          <div class="flex-grow-1">
            <div class="d-flex align-items-center gap-2 mb-1">
              <input type="checkbox" class="batch-check" value="${item.id}" onchange="updateBatchBtn()">
              <h6 class="mb-0">${esc(item.rawStopName)}</h6>
              ${rtBadge(item.rawRouteType)}
            </div>
            <small class="text-muted">Feed: ${esc(item.feedId||'-')} | Raw GTFS ID: <code>${esc(item.rawStopGtfsId||'-')}</code></small>
          </div>
          <span class="badge ${scoreClass} fs-6">${scorePct}%</span>
        </div>
        <div class="row mt-2 g-2">
          <div class="col-sm-6">
            <small class="text-muted">Raw location:</small>
            <span class="small">${item.rawStopLat.toFixed(4)}, ${item.rawStopLon.toFixed(4)}</span>
            <div class="mt-1"><small class="text-muted">Raw RouteType:</small> ${rtBadge(item.rawRouteType)}</div>
          </div>
          <div class="col-sm-6">
            <small class="text-muted">Matched to:</small>
            <span class="small">${hasStation ? esc(item.suggestedStationName) : '<em class="text-muted">New station</em>'}</span>
            ${item.suggestedStationLat ? `<br><span class="small text-muted">${item.suggestedStationLat.toFixed(4)}, ${item.suggestedStationLon.toFixed(4)}</span>` : ''}
            ${item.canonicalRouteType ? `<div class="mt-1"><small class="text-muted">Canonical RouteType:</small> ${rtBadge(item.canonicalRouteType)}</div>` : ''}
          </div>
        </div>
        <div class="d-flex flex-wrap gap-3 mt-1 small text-muted">
          <span>Name match: <strong>${(item.nameSimilarityScore*100).toFixed(0)}%</strong> ${item.nameMatched ? '<i class="bi bi-check-circle text-success"></i>' : '<i class="bi bi-x-circle text-danger"></i>'}</span>
          <span>Distance: <strong>${fmtDist(item.distanceMeters)}</strong> ${item.distanceMatched ? '<i class="bi bi-check-circle text-success"></i>' : '<i class="bi bi-x-circle text-danger"></i>'}</span>
          <span>RouteType: ${item.routeTypeMatched ? '<strong class="text-success">Match</strong>' : '<strong class="text-danger">Mismatch</strong>'}</span>
        </div>
        <div class="mt-2">
          <button class="btn btn-success btn-sm me-1" onclick="approve(${item.id})"><i class="bi bi-check-lg"></i> Approve</button>
          <button class="btn btn-danger btn-sm" onclick="reject(${item.id})"><i class="bi bi-x-lg"></i> Reject</button>
          <a href="/map/" target="_blank" class="btn btn-outline-secondary btn-sm"><i class="bi bi-map"></i> View on Map</a>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('content').innerHTML = `<div>${cards}</div><small class="text-muted">${filtered.length} pending item(s)</small>`;
}

function renderMerged() {
  const filtered = getFilteredMerged();
  if (!filtered.length) {
    document.getElementById('content').innerHTML = '<div class="alert alert-info">No auto-merged items.</div>';
    return;
  }
  const rows = filtered.map(item => {
    const score = item.confidenceScore;
    const scoreClass = score >= 0.8 ? 'bg-success' : score >= 0.5 ? 'bg-warning text-dark' : 'bg-danger';
    return `<tr>
      <td>${esc(item.rawStopName)}</td>
      <td><code>${esc(item.rawStopGtfsId||'-')}</code></td>
      <td>${rtBadge(item.rawRouteType)}</td>
      <td>${esc(item.suggestedStationName||'-')}</td>
      <td>${rtBadge(item.canonicalRouteType)}</td>
      <td><span class="badge ${scoreClass}">${(score*100).toFixed(0)}%</span></td>
      <td class="small">${(item.nameSimilarityScore*100).toFixed(0)}%</td>
      <td class="small">${fmtDist(item.distanceMeters)}</td>
      <td class="small">${item.createdAt ? new Date(item.createdAt).toLocaleString() : '-'}</td>
      <td><span class="badge badge-automerged">Auto-Merged</span></td>
    </tr>`;
  }).join('');
  document.getElementById('content').innerHTML = `<div class="table-responsive"><table class="table table-striped table-hover"><thead class="table-dark"><tr><th>Raw Stop</th><th>Raw GTFS ID</th><th>Raw Type</th><th>Matched To</th><th>Canonical Type</th><th>Score</th><th>Name</th><th>Distance</th><th>Date</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div><small class="text-muted">${filtered.length} item(s)</small>`;
}

function updateBatchBtn() {
  const checked = document.querySelectorAll('.batch-check:checked').length;
  const btn = document.getElementById('batchApproveBtn');
  if (checked > 0) { btn.classList.remove('d-none'); btn.textContent = 'Approve (' + checked + ')'; }
  else { btn.classList.add('d-none'); }
}

async function batchApprove() {
  const ids = [...document.querySelectorAll('.batch-check:checked')].map(cb => parseInt(cb.value));
  if (!ids.length || !confirm('Approve ' + ids.length + ' selected items?')) return;
  for (const id of ids) {
    try {
      await fetch(BASE + '/reconciliation/' + id + '/approve', { method: 'POST' });
    } catch(e) {}
  }
  loadAll();
}

async function approve(id) {
  try {
    const r = await fetch(BASE + '/reconciliation/' + id + '/approve', { method: 'POST' });
    if (r.ok) { loadAll(); }
    else { showError('Failed to approve.'); }
  } catch(e) { showError('Error: ' + e.message); }
}

function reject(id) {
  const html = `<div class="modal fade" id="rejectModal" tabindex="-1"><div class="modal-dialog modal-sm"><div class="modal-content">
    <div class="modal-header"><h6 class="modal-title">Reject Item</h6><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <p class="small">Reject this reconciliation candidate?</p>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="createNewStation">
        <label class="form-check-label small" for="createNewStation">Create new canonical station instead</label>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
      <button type="button" class="btn btn-danger btn-sm" onclick="doReject(${id})">Reject</button>
    </div>
  </div></div></div>`;
  const existing = document.getElementById('rejectModal');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', html);
  const modal = new bootstrap.Modal(document.getElementById('rejectModal'));
  modal.show();
  document.getElementById('rejectModal').addEventListener('hidden.bs.modal', () => document.getElementById('rejectModal').remove());
}

async function doReject(id) {
  const createNew = document.getElementById('createNewStation').checked;
  try {
    const params = new URLSearchParams();
    if (createNew) params.set('createNewStation', 'true');
    const r = await fetch(BASE + '/reconciliation/' + id + '/reject?' + params.toString(), { method: 'POST' });
    if (r.ok) {
      bootstrap.Modal.getInstance(document.getElementById('rejectModal')).hide();
      loadAll();
    } else {
      showError('Failed to reject.');
    }
  } catch(e) { showError('Error: ' + e.message); }
}

function showError(msg) { const e = document.getElementById('error'); e.textContent = msg; e.classList.remove('d-none'); }
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

loadAll();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
