<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reconciliation - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
<script src="/route-colors.js"></script>
<script src="/admin/admin-auth.js"></script>
</head>
<body>
<div class="container">
  <nav class="mb-4"><a href="/" class="text-decoration-none">&larr; Home</a> &gt; <a href="/admin/" class="text-decoration-none">Admin</a></nav>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Reconciliation</h1>
    <div>
      <button class="btn btn-success btn-sm d-none" id="batchApproveBtn" onclick="batchApprove()"><i class="bi bi-check-all"></i> Approve Selected</button>
      <button class="btn btn-outline-primary btn-sm" onclick="loadAll()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
    </div>
  </div>

  <div class="row mb-3 g-2 align-items-end">
    <div class="col-12 col-sm">
      <label class="form-label small text-muted mb-1">Search</label>
      <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Search by name, GTFS ID, or feed..." oninput="onSearchInput()">
    </div>
    <div class="col-auto">
      <label class="form-label small text-muted mb-1">Route Type</label>
      <select id="filterRouteType" class="form-select form-select-sm" onchange="filterItems()">
        <option value="">All Route Types</option>
        <option value="Tram">Tram</option>
        <option value="Subway">Subway</option>
        <option value="Train">Train</option>
        <option value="Bus">Bus</option>
        <option value="Ferry">Ferry</option>
        <option value="CableTram">Cable Tram</option>
        <option value="CableCar">Cable Car</option>
        <option value="Funicular">Funicular</option>
        <option value="Trolleybus">Trolleybus</option>
        <option value="Monorail">Monorail</option>
        <option value="Bicycle">Bicycle</option>
        <option value="Scooter">Scooter</option>
        <option value="Airplane">Airplane</option>
      </select>
    </div>
    <div class="col-auto">
      <label class="form-label small text-muted mb-1">Status</label>
      <select id="filterStatus" class="form-select form-select-sm" onchange="filterItems()">
        <option value="">All Statuses</option>
        <option value="Pending">Pending</option>
        <option value="AutoMerged">Auto-Merged</option>
        <option value="ManuallyApproved">Approved</option>
        <option value="Rejected">Rejected</option>
      </select>
    </div>
  </div>

  <ul class="nav nav-tabs mb-3" id="tabBar">
    <li class="nav-item"><button class="nav-link active" data-tab="pending" onclick="switchTab('pending')">Pending</button></li>
    <li class="nav-item"><button class="nav-link" data-tab="merged" onclick="switchTab('merged')">Auto-Merged</button></li>
  </ul>

  <div id="loading" class="text-center py-4 text-muted"><i class="bi bi-hourglass-split"></i> Loading...</div>
  <div id="error" class="alert alert-danger d-none"></div>
  <div id="content" class="d-none"></div>
  <div id="pagination" class="d-none"></div>
</div>

<script>
const BASE = '';
let currentTab = 'pending';
let pendingPage = 1;
let mergedPage = 1;
let pendingTotal = 0;
let mergedTotal = 0;
const recPageSize = 25;
let searchDebounce = null;

function getSearchQ() {
  return document.getElementById('searchInput').value.trim();
}

function onSearchInput() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => filterItems(), 300);
}

async function loadAll() {
  pendingPage = 1;
  mergedPage = 1;
  await loadPendingPage(1);
  await loadMergedPage(1);
}

async function loadPendingPage(page) {
  pendingPage = page;
  document.getElementById('loading').classList.remove('d-none');
  document.getElementById('error').classList.add('d-none');
  document.getElementById('content').classList.add('d-none');
  try {
    const params = new URLSearchParams({ page: page, perPage: recPageSize });
    const q = getSearchQ();
    const routeType = document.getElementById('filterRouteType').value;
    const statusFilter = document.getElementById('filterStatus').value;
    if (q) params.set('q', q);
    if (routeType) params.set('routeType', routeType);
    if (statusFilter) params.set('status', statusFilter);
    const r = await fetch(BASE + '/reconciliation/pending?' + params.toString());
    if (!r.ok) { showError('Failed to load: ' + (r.statusText || 'Unknown error')); return; }
    const j = await r.json();
    pendingTotal = j.total || 0;
    if (currentTab === 'pending') {
      renderPending(j.data || []);
      renderRecPagination('pending');
      document.getElementById('loading').classList.add('d-none');
      document.getElementById('content').classList.remove('d-none');
    }
  } catch(e) {
    document.getElementById('loading').classList.add('d-none');
    showError('Failed to load: ' + e.message);
  }
}

async function loadMergedPage(page) {
  mergedPage = page;
  document.getElementById('loading').classList.remove('d-none');
  document.getElementById('error').classList.add('d-none');
  document.getElementById('content').classList.add('d-none');
  try {
    const params = new URLSearchParams({ page: page, perPage: recPageSize });
    const q = getSearchQ();
    const routeType = document.getElementById('filterRouteType').value;
    if (q) params.set('q', q);
    if (routeType) params.set('routeType', routeType);
    const r = await fetch(BASE + '/reconciliation/auto-merged?' + params.toString());
    if (!r.ok) { showError('Failed to load: ' + (r.statusText || 'Unknown error')); return; }
    const j = await r.json();
    mergedTotal = j.total || 0;
    if (currentTab === 'merged') {
      renderMerged(j.data || []);
      renderRecPagination('merged');
      document.getElementById('loading').classList.add('d-none');
      document.getElementById('content').classList.remove('d-none');
    }
  } catch(e) {
    document.getElementById('loading').classList.add('d-none');
    showError('Failed to load: ' + e.message);
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('#tabBar .nav-link').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  document.getElementById('batchApproveBtn').classList.toggle('d-none', tab !== 'pending');
  if (tab === 'pending') loadPendingPage(pendingPage);
  else loadMergedPage(mergedPage);
}

function filterItems() {
  if (currentTab === 'pending') loadPendingPage(1);
  else loadMergedPage(1);
}

function renderRecPagination(tab) {
  const el = document.getElementById('pagination');
  const totalItems = tab === 'pending' ? pendingTotal : mergedTotal;
  const curPage = tab === 'pending' ? pendingPage : mergedPage;
  const totalPages = Math.ceil(totalItems / recPageSize) || 1;
  if (totalPages <= 1) { el.classList.add('d-none'); return; }
  el.classList.remove('d-none');
  let pages = [];
  for (let i = Math.max(1, curPage - 2); i <= Math.min(totalPages, curPage + 2); i++) pages.push(i);
  const goPage = tab === 'pending' ? 'loadPendingPage' : 'loadMergedPage';
  const prevPage = Math.max(1, curPage - 1);
  const nextPage = Math.min(totalPages, curPage + 1);
  el.innerHTML = `<nav><ul class="pagination pagination-sm justify-content-center mt-2">
    <li class="page-item ${curPage <= 1 ? 'disabled' : ''}"><button class="page-link" onclick="${goPage}(${prevPage})">Previous</button></li>
    ${curPage > 3 ? '<li class="page-item disabled"><span class="page-link">...</span></li>' : ''}
    ${pages.map(p => `<li class="page-item ${p === curPage ? 'active' : ''}"><button class="page-link" onclick="${goPage}(${p})">${p}</button></li>`).join('')}
    ${curPage < totalPages - 2 ? '<li class="page-item disabled"><span class="page-link">...</span></li>' : ''}
    <li class="page-item ${curPage >= totalPages ? 'disabled' : ''}"><button class="page-link" onclick="${goPage}(${nextPage})">Next</button></li>
  </ul><small class="text-muted d-block text-center">Page ${curPage} of ${totalPages} (${totalItems} items)</small></nav>`;
}

function fmtDist(m) {
  if (m == null) return '-';
  if (m < 1000) return m.toFixed(0) + ' m';
  return (m / 1000).toFixed(2) + ' km';
}

function threshBar(value, threshold, label) {
  const pct = Math.min(value / threshold * 100, 200);
  const color = value >= threshold ? 'bg-success' : value >= threshold * 0.7 ? 'bg-warning' : 'bg-danger';
  return `<div class="d-flex align-items-center gap-2 mb-1">
    <span class="small" style="min-width:70px">${label}</span>
    <div class="progress flex-grow-1" style="height:6px">
      <div class="progress-bar ${color}" style="width:${pct}%;transition:width 0.3s"></div>
    </div>
    <span class="small text-nowrap ${value >= threshold ? 'text-success' : value >= threshold * 0.7 ? 'text-warning' : 'text-danger'}">
      <strong>${(value*100).toFixed(0)}%</strong> / ${(threshold*100).toFixed(0)}%
    </span>
  </div>`;
}

function computeVerdict(item) {
  // Mirrors ReconciliationManager.ComputeAutoMergeVerdict on the server
  if (item.status === 'AutoMerged') return '\u2705 AUTO-MERGED \u2014 all 3 criteria met';
  if (item.status === 'NewStation') return '\u2139 NEW STATION \u2014 no suitable match found nearby';
  if (item.status === 'ManuallyApproved') return '\u2705 MANUALLY APPROVED';
  if (item.status === 'Rejected') return '\u2717 REJECTED';

  var failures = [];
  var nameThresh = item.autoMergeNameThreshold || 0.90;
  var distThresh = item.autoMergeDistanceMeters || 100;

  if (!item.nameMatched) {
    var pct = (item.nameSimilarityScore * 100).toFixed(0);
    failures.push('name ' + pct + '% < ' + (nameThresh * 100).toFixed(0) + '%');
  }
  if (!item.distanceMatched) {
    var d = item.distanceMeters < 1000
      ? item.distanceMeters.toFixed(0) + 'm'
      : (item.distanceMeters / 1000).toFixed(2) + 'km';
    failures.push('distance ' + d + ' > ' + distThresh.toFixed(0) + 'm');
  }
  if (!item.routeTypeMatched) {
    if (item.rawRouteType && item.canonicalRouteType)
      failures.push('route type mismatch (' + item.rawRouteType + ' vs ' + item.canonicalRouteType + ')');
    else
      failures.push('route type mismatch');
  }
  if (failures.length === 0) return '\u26A0 PENDING \u2014 unknown reason';
  return '\u274C PENDING \u2014 ' + failures.join(', ');
}

function renderMatchExplanation(item) {
  let html = '<div class="match-detail mt-2 p-2 bg-light rounded small border">';
  html += '<strong class="d-block mb-1"><i class="bi bi-info-circle"></i> Why this match?</strong>';

  // Verdict banner: use server verdict if available, otherwise compute client-side
  const verdict = item.autoMergeVerdict || computeVerdict(item);
  let verdictClass = 'text-success';
  if (verdict.startsWith('\u274C')) verdictClass = 'text-danger fw-bold';
  else if (verdict.startsWith('\u26A0') || verdict.startsWith('\u2139')) verdictClass = 'text-warning fw-bold';
  if (verdict) {
    html += `<div class="mb-2 p-1 rounded ${verdictClass}">${esc(verdict)}</div>`;
  }

  if (item.suggestedStationName) {
    html += `<div class="mb-2">
      <span class="text-muted">Raw: </span><strong>${esc(item.rawStopName)}</strong>
      ${rtBadge(item.rawRouteType)}
      <span class="mx-1 text-muted">&rarr;</span>
      <span class="text-muted">Match: </span><strong>${esc(item.suggestedStationName)}</strong>
      ${item.canonicalRouteType ? rtBadge(item.canonicalRouteType) : ''}
    </div>`;
  }

  const s = item.confidenceScore;
  const sClass = s >= 0.8 ? 'bg-success' : s >= 0.5 ? 'bg-warning text-dark' : 'bg-danger';

  if (item.nameSimilarityScore != null) {
    const ns = item.nameSimilarityScore;
    const nsClass = ns >= 0.9 ? 'text-success' : ns >= 0.7 ? 'text-warning' : 'text-danger';
    html += `<div class="mb-1"><span class="text-muted">Name: </span>
      <strong class="${nsClass}">${(ns*100).toFixed(0)}%</strong>
      ${item.nameMatched ? '<span class="badge bg-success-subtle text-success border border-success-subtle">Pass</span>' : '<span class="badge bg-danger-subtle text-danger border border-danger-subtle">Fail</span>'}</div>`;
  }

  if (item.distanceMeters != null) {
    const dm = item.distanceMeters;
    const dmClass = dm <= 100 ? 'text-success' : dm <= 300 ? 'text-warning' : 'text-danger';
    html += `<div class="mb-1"><span class="text-muted">Distance: </span>
      <strong class="${dmClass}">${fmtDist(dm)}</strong>
      ${item.distanceMatched ? '<span class="badge bg-success-subtle text-success border border-success-subtle">Pass</span>' : '<span class="badge bg-danger-subtle text-danger border border-danger-subtle">Fail</span>'}</div>`;
  }

  html += `<div class="mb-1"><span class="text-muted">Route type: </span>
    ${item.routeTypeMatched
      ? '<strong class="text-success">Match</strong> <span class="badge bg-success-subtle text-success border border-success-subtle">Pass</span>'
      : '<strong class="text-danger">Mismatch</strong> <span class="badge bg-danger-subtle text-danger border border-danger-subtle">Fail</span>'}</div>`;

  // Raw stop routes & operators
  if (item.rawStopDetail && item.rawStopDetail.routes && item.rawStopDetail.routes.length > 0) {
    html += '<div class="mt-2"><span class="text-danger small fw-bold">Raw stop routes: </span>';
    html += item.rawStopDetail.routes.map(r =>
      `<span class="rt-badge me-1" style="background:${ROUTE_COLORS[r.routeType]||'#888'}" title="${esc(r.name||'')} — ${esc(r.operatorName||'')}">${esc(r.shortName || r.name) || '?'}</span>`
    ).join(' ');
    html += '</div>';
  }
  if (item.rawStopDetail && item.rawStopDetail.operators && item.rawStopDetail.operators.length > 0) {
    html += '<div class="mt-1"><span class="text-muted small">Raw operator: </span>';
    html += item.rawStopDetail.operators.map(o => `<strong>${esc(o.name)}</strong> <span class="text-muted">(${o.operatorType})</span>`).join(', ');
    html += '</div>';
  }

  // Suggested station routes & operators
  if (item.suggestedStationDetail && item.suggestedStationDetail.routes && item.suggestedStationDetail.routes.length > 0) {
    html += '<div class="mt-2"><span class="text-success small fw-bold">Matched station routes: </span>';
    html += item.suggestedStationDetail.routes.map(r =>
      `<span class="rt-badge me-1" style="background:${ROUTE_COLORS[r.routeType]||'#888'}" title="${esc(r.name||'')} — ${esc(r.operatorName||'')}">${esc(r.shortName || r.name) || '?'}</span>`
    ).join(' ');
    html += '</div>';
  }
  if (item.suggestedStationDetail && item.suggestedStationDetail.operators && item.suggestedStationDetail.operators.length > 0) {
    html += '<div class="mt-1"><span class="text-muted small">Matched operators: </span>';
    html += item.suggestedStationDetail.operators.map(o => `<strong>${esc(o.name)}</strong> <span class="text-muted">(${o.operatorType})</span>`).join(', ');
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function renderPending(filtered) {
  if (!filtered.length) {
    document.getElementById('content').innerHTML = '<div class="alert alert-success"><i class="bi bi-check-circle"></i> No pending reconciliation items.</div>';
    return;
  }
  const cards = filtered.map(item => {
    const score = item.confidenceScore;
    const isNewStation = item.status === "NewStation";
    const scorePct = (score * 100).toFixed(0);
    const scoreClass = score >= 0.8 ? 'bg-success' : score >= 0.5 ? 'bg-warning text-dark' : 'bg-danger';
    const hasStation = item.suggestedStationName;
    const scoreBadge = isNewStation
      ? '<span class="badge bg-secondary fs-6">New</span>'
      : `<span class="badge ${scoreClass} fs-6">${scorePct}%</span>`;
    const detailId = `detail-${item.id}`;
    return `<div class="card mb-3 shadow-sm" id="rec-${item.id}">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-start">
          <div class="flex-grow-1">
            <div class="d-flex align-items-center gap-2 mb-1">
              <input type="checkbox" class="batch-check" value="${item.id}" onchange="updateBatchBtn()">
              <h6 class="mb-0">${esc(item.rawStopName)}</h6>
              ${rtBadge(item.rawRouteType)}
              ${isNewStation ? '<span class="badge bg-secondary">New Station</span>' : ''}
            </div>
            <small class="text-muted">Feed: ${esc(item.feedId||'-')} | Raw GTFS ID: <code>${esc(item.rawStopGtfsId||'-')}</code></small>
          </div>
          ${scoreBadge}
        </div>
        <div class="row mt-2 g-2">
          <div class="col-sm-6">
            <small class="text-muted">Raw location:</small>
            <span class="small">${item.rawStopLat.toFixed(4)}, ${item.rawStopLon.toFixed(4)}</span>
            <div class="mt-1"><small class="text-muted">Raw RouteType:</small> ${rtBadge(item.rawRouteType)}</div>
          </div>
          <div class="col-sm-6">
            <small class="text-muted">Matched to:</small>
            <span class="small">${hasStation ? esc(item.suggestedStationName) : '<em class="text-muted">New station</em>'}</span>
            ${item.suggestedStationLat ? `<br><span class="small text-muted">${item.suggestedStationLat.toFixed(4)}, ${item.suggestedStationLon.toFixed(4)}</span>` : ''}
            ${item.canonicalRouteType ? `<div class="mt-1"><small class="text-muted">Canonical RouteType:</small> ${rtBadge(item.canonicalRouteType)}</div>` : ''}
          </div>
        </div>
        <div class="d-flex flex-wrap gap-3 mt-1 small text-muted">
          <span>Name: <strong>${(item.nameSimilarityScore*100).toFixed(0)}%</strong> ${item.nameMatched ? '<i class="bi bi-check-circle text-success"></i>' : '<i class="bi bi-x-circle text-danger"></i>'}</span>
          <span>Distance: <strong>${fmtDist(item.distanceMeters)}</strong> ${item.distanceMatched ? '<i class="bi bi-check-circle text-success"></i>' : '<i class="bi bi-x-circle text-danger"></i>'}</span>
          <span>RouteType: ${item.routeTypeMatched ? '<strong class="text-success">Match</strong>' : '<strong class="text-danger">Mismatch</strong>'}</span>
        </div>
        <div id="${detailId}" class="detail-collapse" style="display:none">
          ${renderMatchExplanation(item)}
        </div>
        <div class="mt-2 d-flex flex-wrap gap-1">
          <button class="btn btn-success btn-sm" onclick="approve(${item.id})"><i class="bi bi-check-lg"></i> Approve</button>
          <button class="btn btn-danger btn-sm" onclick="reject(${item.id})"><i class="bi bi-x-lg"></i> Reject</button>
          <button class="btn btn-outline-info btn-sm" onclick="toggleDetail('${detailId}')"><i class="bi bi-question-circle"></i> Why?</button>
          <a href="/admin/reconciliation-map.html?candidateId=${item.id}" target="_blank" class="btn btn-outline-secondary btn-sm"><i class="bi bi-map"></i> View on Map</a>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('content').innerHTML = `<div>${cards}</div>`;
}

function toggleDetail(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function renderMerged(filtered) {
  if (!filtered.length) {
    document.getElementById('content').innerHTML = '<div class="alert alert-info">No auto-merged items.</div>';
    return;
  }
  const rows = filtered.map(item => {
    const score = item.confidenceScore;
    const scoreClass = score >= 0.8 ? 'bg-success' : score >= 0.5 ? 'bg-warning text-dark' : 'bg-danger';
    const expId = `exp-${item.id}`;
    return `<tr class="table-clickable" onclick="toggleRowExpansion('${expId}')">
      <td>${esc(item.rawStopName)}</td>
      <td><code>${esc(item.rawStopGtfsId||'-')}</code></td>
      <td>${rtBadge(item.rawRouteType)}</td>
      <td>${esc(item.suggestedStationName||'-')}</td>
      <td>${rtBadge(item.canonicalRouteType)}</td>
      <td><span class="badge ${scoreClass}">${(score*100).toFixed(0)}%</span></td>
      <td class="small">${(item.nameSimilarityScore*100).toFixed(0)}%</td>
      <td class="small">${fmtDist(item.distanceMeters)}</td>
      <td class="small">${item.createdAt ? new Date(item.createdAt).toLocaleString() : '-'}</td>
      <td><span class="badge badge-automerged">Auto-Merged</span></td>
      <td><a href="/admin/reconciliation-map.html?candidateId=${item.id}" target="_blank" class="btn btn-outline-secondary btn-sm py-0 px-1"><i class="bi bi-map"></i></a></td>
    </tr>
    <tr id="${expId}" class="detail-row" style="display:none">
      <td colspan="11">
        <div class="detail-inner">
          ${renderMatchExplanation(item)}
        </div>
      </td>
    </tr>`;
  }).join('');
  document.getElementById('content').innerHTML = `<div class="table-responsive"><table class="table table-striped table-hover"><thead class="table-dark"><tr>
    <th>Raw Stop</th><th>Raw GTFS ID</th><th>Raw Type</th><th>Matched To</th><th>Canonical Type</th><th>Score</th><th>Name</th><th>Distance</th><th>Date</th><th>Status</th><th>Map</th>
  </tr></thead><tbody>${rows}</tbody></table></div>`;
}

function toggleRowExpansion(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'none' ? 'table-row' : 'none';
}

function updateBatchBtn() {
  const checked = document.querySelectorAll('.batch-check:checked').length;
  const btn = document.getElementById('batchApproveBtn');
  if (checked > 0) { btn.classList.remove('d-none'); btn.textContent = 'Approve (' + checked + ')'; }
  else { btn.classList.add('d-none'); }
}
async function batchApprove() {
  const ids = [...document.querySelectorAll('.batch-check:checked')].map(cb => parseInt(cb.value));
  if (!ids.length || !confirm('Approve ' + ids.length + ' selected items?')) return;
  const results = await Promise.all(ids.map(id =>
    fetch(BASE + '/reconciliation/' + id + '/approve', { method: 'POST' })
      .then(r => r.ok).catch(() => false)
  ));
  const ok = results.filter(Boolean).length;
  const fail = results.length - ok;
  if (fail > 0) showError(`${ok} of ${ids.length} approved, ${fail} failed`);
  loadAll();
}

async function approve(id) {
  try {
    const r = await fetch(BASE + '/reconciliation/' + id + '/approve', { method: 'POST' });
    if (r.ok) { loadAll(); }
    else { showError('Failed to approve.'); }
  } catch(e) { showError('Error: ' + e.message); }
}

function reject(id) {
  const html = `<div class="modal fade" id="rejectModal" tabindex="-1"><div class="modal-dialog modal-sm"><div class="modal-content">
    <div class="modal-header"><h6 class="modal-title">Reject Item</h6><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <p class="small">Reject this reconciliation candidate?</p>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="createNewStation">
        <label class="form-check-label small" for="createNewStation">Create new canonical station instead</label>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
      <button type="button" class="btn btn-danger btn-sm" onclick="doReject(${id})">Reject</button>
    </div>
  </div></div></div>`;
  const existing = document.getElementById('rejectModal');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', html);
  const modal = new bootstrap.Modal(document.getElementById('rejectModal'));
  modal.show();
  document.getElementById('rejectModal').addEventListener('hidden.bs.modal', () => document.getElementById('rejectModal').remove());
}

async function doReject(id) {
  const createNew = document.getElementById('createNewStation').checked;
  try {
    const params = new URLSearchParams();
    if (createNew) params.set('createNewStation', 'true');
    const r = await fetch(BASE + '/reconciliation/' + id + '/reject?' + params.toString(), { method: 'POST' });
    if (r.ok) {
      bootstrap.Modal.getInstance(document.getElementById('rejectModal')).hide();
      loadAll();
    } else {
      showError('Failed to reject.');
    }
  } catch(e) { showError('Error: ' + e.message); }
}

function showError(msg) { const e = document.getElementById('error'); e.textContent = msg; e.classList.remove('d-none'); }
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

loadAll();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
