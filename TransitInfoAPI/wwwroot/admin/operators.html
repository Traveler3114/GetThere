<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Operators - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <nav class="mb-4"><a href="/" class="text-decoration-none">&larr; Home</a> &gt; <a href="/admin/" class="text-decoration-none">Admin</a></nav>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Operators</h1>
    <div>
      <button class="btn btn-success btn-sm" onclick="showAddModal()"><i class="bi bi-plus-lg"></i> Add Operator</button>
      <button class="btn btn-outline-primary btn-sm" onclick="loadOperators()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
    </div>
  </div>

  <div class="row mb-3 g-2">
    <div class="col-auto">
      <select id="filterType" class="form-select form-select-sm" onchange="loadOperators()">
        <option value="">All Types</option>
        <option value="Transit">Transit</option>
        <option value="Rail">Rail</option>
        <option value="Ferry">Ferry</option>
        <option value="Air">Air</option>
        <option value="Coach">Coach</option>
        <option value="BikeShare">Bike Share</option>
        <option value="ScooterShare">Scooter Share</option>
        <option value="CableCarFunicular">Cable Car</option>
      </select>
    </div>
    <div class="col-auto">
      <select id="filterCountry" class="form-select form-select-sm" onchange="loadOperators()">
        <option value="">All Countries</option>
      </select>
    </div>
    <div class="col-auto">
      <div class="form-check form-switch mt-1">
        <input class="form-check-input" type="checkbox" id="filterVerified" onchange="loadOperators()">
        <label class="form-check-label small" for="filterVerified">Verified only</label>
      </div>
    </div>
  </div>

  <div id="loading" class="text-center py-4 text-muted"><i class="bi bi-hourglass-split"></i> Loading...</div>
  <div id="error" class="alert alert-danger d-none"></div>
  <div id="content" class="d-none"></div>
</div>

<script>
const BASE = '';
let allOperators = [];

async function loadOperators() {
  const el = document.getElementById('loading'); el.classList.remove('d-none');
  document.getElementById('error').classList.add('d-none');
  document.getElementById('content').classList.add('d-none');
  try {
    const r = await fetch(BASE + '/operators');
    const j = await r.json();
    allOperators = j.data || [];
    populateCountryFilter(allOperators);
    renderOperators();
    el.classList.add('d-none');
    document.getElementById('content').classList.remove('d-none');
  } catch(e) {
    el.classList.add('d-none');
    showError('Failed to load operators: ' + e.message);
  }
}

function populateCountryFilter(ops) {
  const sel = document.getElementById('filterCountry');
  const cur = sel.value;
  const countries = [...new Set(ops.filter(o=>o.countryName).map(o=>o.countryName))].sort();
  sel.innerHTML = '<option value="">All Countries</option>' + countries.map(c => `<option value="${c}"${c===cur?' selected':''}>${c}</option>`).join('');
}

function renderOperators() {
  const type = document.getElementById('filterType').value;
  const country = document.getElementById('filterCountry').value;
  const verifiedOnly = document.getElementById('filterVerified').checked;
  let filtered = allOperators;
  if (type) filtered = filtered.filter(o => o.operatorType === type);
  if (country) filtered = filtered.filter(o => o.countryName === country);
  if (verifiedOnly) filtered = filtered.filter(o => o.isVerified);
  if (!filtered.length) {
    document.getElementById('content').innerHTML = '<div class="alert alert-info">No operators found.</div>';
    return;
  }
  const rows = filtered.map(o => `<tr>
    <td><a href="#" class="text-decoration-none" onclick="event.preventDefault();showDetail('${o.globalId}')">${esc(o.name)}</a></td>
    <td>${esc(o.shortName)}</td>
    <td><span class="badge bg-secondary">${esc(o.operatorType)}</span></td>
    <td>${esc(o.countryName||'-')}</td>
    <td>${o.isVerified ? '<span class="badge badge-verified">Verified</span>' : '<span class="badge badge-unverified">Unverified</span>'}</td>
    <td>
      <button class="btn btn-sm btn-outline-info" onclick="showDetail('${o.globalId}')" title="View details"><i class="bi bi-eye"></i></button>
      ${o.website ? `<a href="${esc(o.website)}" target="_blank" class="btn btn-sm btn-outline-secondary" title="Visit website"><i class="bi bi-box-arrow-up-right"></i></a>` : ''}
    </td>
  </tr>`).join('');
  document.getElementById('content').innerHTML = `<div class="table-responsive"><table class="table table-striped table-hover"><thead class="table-dark"><tr><th>Name</th><th>Short Name</th><th>Type</th><th>Country</th><th>Status</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div><small class="text-muted">${filtered.length} operator(s)</small>`;
}

async function showDetail(globalId) {
  const o = allOperators.find(x => x.globalId === globalId);
  if (!o) return;
  let stationsHtml = '', routesHtml = '', feedsHtml = '';
  try {
    const [sR, rR, fR] = await Promise.all([
      fetch(BASE + '/operators/' + globalId + '/stations').then(r=>r.json()),
      fetch(BASE + '/operators/' + globalId + '/routes').then(r=>r.json()),
      fetch(BASE + '/operators/' + globalId + '/feeds').then(r=>r.json())
    ]);
    const stations = sR.data || [];
    const routes = rR.data || [];
    const feeds = fR.data || [];
    stationsHtml = stations.length ? '<h6>Stations</h6><div class="table-responsive"><table class="table table-sm table-bordered"><thead><tr><th>Name</th><th>Type</th><th>Location</th></tr></thead><tbody>' + stations.map(s => `<tr><td>${esc(s.name)}</td><td>${esc(s.stationType)}</td><td>${s.latitude.toFixed(4)}, ${s.longitude.toFixed(4)}</td></tr>`).join('') + '</tbody></table></div>' : '<p class="text-muted small">No stations.</p>';
    routesHtml = routes.length ? '<h6>Routes</h6><div class="table-responsive"><table class="table table-sm table-bordered"><thead><tr><th>Name</th><th>Type</th></tr></thead><tbody>' + routes.map(r => `<tr><td>${esc(r.name)}</td><td>${esc(r.routeType)}</td></tr>`).join('') + '</tbody></table></div>' : '<p class="text-muted small">No routes.</p>';
    feedsHtml = feeds.length ? '<h6>Feeds</h6><div class="table-responsive"><table class="table table-sm table-bordered"><thead><tr><th>Feed ID</th><th>Type</th><th>Active</th></tr></thead><tbody>' + feeds.map(f => `<tr><td>${esc(f.feedId)}</td><td>${esc(f.feedType)}</td><td>${f.isActive ? '<span class="badge bg-success">Yes</span>' : '<span class="badge bg-secondary">No</span>'}</td></tr>`).join('') + '</tbody></table></div>' : '<p class="text-muted small">No feeds.</p>';
  } catch(e) { stationsHtml = '<p class="text-danger small">Error loading details.</p>'; }

  const html = `<div class="modal fade" id="detailModal" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-scrollable"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">${esc(o.name)}</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <dl class="row mb-3">
        <dt class="col-sm-3">Global ID</dt><dd class="col-sm-9">${esc(o.globalId)}</dd>
        <dt class="col-sm-3">Type</dt><dd class="col-sm-9">${esc(o.operatorType)}</dd>
        <dt class="col-sm-3">Country</dt><dd class="col-sm-9">${o.countryName || '-'}</dd>
        <dt class="col-sm-3">Website</dt><dd class="col-sm-9">${o.website ? '<a href="'+esc(o.website)+'" target="_blank">'+esc(o.website)+'</a>' : '-'}</dd>
        <dt class="col-sm-3">Verified</dt><dd class="col-sm-9">${o.isVerified ? 'Yes' : 'No'}</dd>
      </dl>
      ${stationsHtml}
      ${routesHtml}
      ${feedsHtml}
    </div>
    <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button></div>
  </div></div></div>`;
  const existing = document.getElementById('detailModal');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', html);
  const modal = new bootstrap.Modal(document.getElementById('detailModal'));
  modal.show();
  document.getElementById('detailModal').addEventListener('hidden.bs.modal', () => document.getElementById('detailModal').remove());
}

function showError(msg) { const e = document.getElementById('error'); e.textContent = msg; e.classList.remove('d-none'); }
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

async function showAddModal() {
  let countries = [];
  try {
    const r = await fetch(BASE + '/countries');
    const j = await r.json();
    countries = j.data || [];
  } catch(e) {}

  const countryOptions = countries.map(c => `<option value="${c.id}">${esc(c.name)} (${esc(c.isoCode)})</option>`).join('');
  const html = `<div class="modal fade" id="addModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Add Operator</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" id="addName" class="form-control form-control-sm" placeholder="e.g. Zagrebački električni tramvaj">
      </div>
      <div class="mb-3">
        <label class="form-label">Short Name</label>
        <input type="text" id="addShortName" class="form-control form-control-sm" placeholder="e.g. ZET">
      </div>
      <div class="mb-3">
        <label class="form-label">Country</label>
        <select id="addCountryId" class="form-select form-select-sm">${countryOptions}</select>
      </div>
      <div class="mb-3">
        <label class="form-label">Type</label>
        <select id="addOperatorType" class="form-select form-select-sm">
          <option value="Transit">Transit</option>
          <option value="Rail">Rail</option>
          <option value="Ferry">Ferry</option>
          <option value="Air">Air</option>
          <option value="Coach">Coach</option>
          <option value="BikeShare">Bike Share</option>
          <option value="ScooterShare">Scooter Share</option>
          <option value="CableCarFunicular">Cable Car</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Website</label>
        <input type="url" id="addWebsite" class="form-control form-control-sm" placeholder="https://...">
      </div>
      <div class="mb-3">
        <label class="form-label">Global ID <small class="text-muted">(leave empty to auto-generate)</small></label>
        <input type="text" id="addGlobalId" class="form-control form-control-sm" placeholder="Auto: gt-{country}-{shortname}">
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
      <button type="button" class="btn btn-primary" onclick="addOperator()">Add Operator</button>
    </div>
  </div></div></div>`;
  const existing = document.getElementById('addModal');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', html);
  const modal = new bootstrap.Modal(document.getElementById('addModal'));
  modal.show();
  document.getElementById('addModal').addEventListener('hidden.bs.modal', () => document.getElementById('addModal').remove());
}

async function addOperator() {
  const name = document.getElementById('addName').value.trim();
  const shortName = document.getElementById('addShortName').value.trim();
  const countryId = parseInt(document.getElementById('addCountryId').value);
  const operatorType = document.getElementById('addOperatorType').value;
  const website = document.getElementById('addWebsite').value.trim() || null;
  const globalId = document.getElementById('addGlobalId').value.trim() || null;
  if (!name || !shortName) { alert('Name and Short Name are required.'); return; }
  try {
    const r = await fetch(BASE + '/operators', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, shortName, countryId, operatorType, website, globalId})
    });
    const j = await r.json();
    if (j.success) {
      bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
      loadOperators();
    } else {
      alert(j.message || 'Failed to add operator.');
    }
  } catch(e) { alert('Error: ' + e.message); }
}

loadOperators();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
