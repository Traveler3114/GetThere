<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stations - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <nav class="mb-4"><a href="/" class="text-decoration-none">&larr; Home</a> &gt; <a href="/admin/" class="text-decoration-none">Admin</a></nav>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Stations</h1>
    <button class="btn btn-outline-primary btn-sm" onclick="loadStations()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
  </div>

  <div class="row mb-3 g-2">
    <div class="col-auto flex-grow-1">
      <input type="text" id="search" class="form-control form-control-sm" placeholder="Search by name..." oninput="scheduleSearch()">
    </div>
    <div class="col-auto">
      <select id="filterRouteType" class="form-select form-select-sm" onchange="scheduleSearch()">
        <option value="">All Route Types</option>
        <option value="Bus">Bus</option>
        <option value="Tram">Tram</option>
        <option value="Metro">Metro</option>
        <option value="Rail">Rail</option>
        <option value="Ferry">Ferry</option>
        <option value="CableCar">Cable Car</option>
        <option value="Funicular">Funicular</option>
        <option value="Trolleybus">Trolleybus</option>
      </select>
    </div>
    <div class="col-auto">
      <select id="filterType" class="form-select form-select-sm" onchange="applyFilters()">
        <option value="">All Types</option>
        <option value="Station">Station</option>
        <option value="Stop">Stop</option>
        <option value="Airport">Airport</option>
        <option value="Port">Port</option>
        <option value="BusTerminal">Bus Terminal</option>
        <option value="FerryTerminal">Ferry Terminal</option>
        <option value="Platform">Platform</option>
      </select>
    </div>
    <div class="col-auto">
      <select id="filterCountry" class="form-select form-select-sm" onchange="applyFilters()">
        <option value="">All Countries</option>
      </select>
    </div>
  </div>

  <div id="loading" class="text-center py-4 text-muted"><i class="bi bi-hourglass-split"></i> Loading...</div>
  <div id="error" class="alert alert-danger d-none"></div>
  <div id="content" class="d-none"></div>
  <div id="pagination" class="d-none"></div>
  <div id="statusBar" class="small text-muted mt-2 d-none"></div>
</div>

<script>
const BASE = '';
let allStations = [];
let searchTimer = null;

const ROUTE_COLORS = { Tram: '#33a02c', Metro: '#e31a1c', Rail: '#b15928', Bus: '#1f78b4', Ferry: '#33a02c', LightRail: '#ff7f00', CableCar: '#ff7f00', Gondola: '#6a3d9a', Funicular: '#b15928', Trolleybus: '#1f78b4' };

function rtBadge(type) {
  if (!type) return '';
  const color = ROUTE_COLORS[type] || '#888';
  return `<span class="rt-badge" style="background:${color}">${type}</span>`;
}

function scheduleSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 250);
}

async function loadStations() {
  document.getElementById('search').value = '';
  document.getElementById('filterRouteType').value = '';
  document.getElementById('filterType').value = '';
  document.getElementById('filterCountry').value = '';
  document.getElementById('loading').classList.remove('d-none');
  document.getElementById('error').classList.add('d-none');
  document.getElementById('content').classList.add('d-none');
  document.getElementById('statusBar').classList.add('d-none');
  try {
    const r = await fetch(BASE + '/stations/search?perPage=10000');
    if (!r.ok) { showError('Failed to load: ' + (r.statusText || 'Unknown error')); return; }
    const j = await r.json();
    allStations = j.data || [];
    // Populate country dropdown from station data
    const names = [...new Set(allStations.filter(s => s.countryName).map(s => s.countryName))].sort();
    document.getElementById('filterCountry').innerHTML = '<option value="">All Countries</option>' + names.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('');
    applyFilters();
    document.getElementById('loading').classList.add('d-none');
    document.getElementById('content').classList.remove('d-none');
    document.getElementById('statusBar').classList.remove('d-none');
    document.getElementById('statusBar').textContent = `Loaded ${allStations.length} station(s)`;
  } catch(e) {
    document.getElementById('loading').classList.add('d-none');
    showError('Failed to load stations: ' + e.message);
  }
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const rt = document.getElementById('filterRouteType').value;
  const stationType = document.getElementById('filterType').value;
  const country = document.getElementById('filterCountry').value;
  let filtered = allStations;
  if (q) filtered = filtered.filter(s => s.name.toLowerCase().includes(q));
  if (rt) filtered = filtered.filter(s => s.primaryRouteType === rt);
  if (stationType) filtered = filtered.filter(s => s.stationType === stationType);
  if (country) filtered = filtered.filter(s => s.countryName === country);
  paginatedItems = filtered;
  showPage(1);
}

let currentPage = 1;
const pageSize = 50;
let paginatedItems = [];

function showPage(page) {
  currentPage = page;
  const start = (currentPage - 1) * pageSize;
  const pageData = paginatedItems.slice(start, start + pageSize);
  const totalPages = Math.ceil(paginatedItems.length / pageSize) || 1;
  renderStations(pageData);
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1 && paginatedItems.length <= pageSize) { el.classList.add('d-none'); return; }
  el.classList.remove('d-none');
  let pages = [];
  for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) pages.push(i);
  el.innerHTML = `<nav><ul class="pagination pagination-sm justify-content-center mt-2">
    <li class="page-item ${currentPage <= 1 ? 'disabled' : ''}"><button class="page-link" onclick="showPage(${currentPage - 1})">Previous</button></li>
    ${currentPage > 3 ? '<li class="page-item disabled"><span class="page-link">...</span></li>' : ''}
    ${pages.map(p => `<li class="page-item ${p === currentPage ? 'active' : ''}"><button class="page-link" onclick="showPage(${p})">${p}</button></li>`).join('')}
    ${currentPage < totalPages - 2 ? '<li class="page-item disabled"><span class="page-link">...</span></li>' : ''}
    <li class="page-item ${currentPage >= totalPages ? 'disabled' : ''}"><button class="page-link" onclick="showPage(${currentPage + 1})">Next</button></li>
  </ul><small class="text-muted d-block text-center">Page ${currentPage} of ${totalPages} (${paginatedItems.length} items)</small></nav>`;
  document.getElementById('statusBar').textContent = `Filtered: ${paginatedItems.length} station(s)`;
}

function renderStations(list) {
  if (!list.length) {
    document.getElementById('content').innerHTML = '<div class="alert alert-info">No stations found.</div>';
    return;
  }
  const rows = list.map(s => `<tr class="table-clickable" onclick="toggleDetail(this, '${esc(s.globalId)}')">
    <td>${esc(s.name)}</td>
    <td><code>${esc(s.globalId)}</code></td>
    <td><code class="small">${esc(s.onestopId||'-')}</code></td>
    <td><span class="badge bg-secondary">${esc(s.stationType)}</span></td>
    <td>${rtBadge(s.primaryRouteType)}</td>
    <td>${esc(s.countryName||'-')}</td>
    <td>${esc(s.cityName||'-')}</td>
    <td class="small text-nowrap">${s.latitude.toFixed(4)}, ${s.longitude.toFixed(4)}</td>
  </tr><tr class="detail-row" id="detail-${esc(s.globalId)}"><td colspan="8"><div class="detail-inner" id="detailInner-${esc(s.globalId)}"><i class="bi bi-hourglass-split"></i> Loading...</div></td></tr>`).join('');
  document.getElementById('content').innerHTML = `<div class="table-responsive"><table class="table table-striped table-hover" id="stationTable"><thead class="table-dark"><tr><th>Name</th><th>Global ID</th><th>Onestop ID</th><th>Type</th><th>Route Type</th><th>Country</th><th>City</th><th>Location</th></tr></thead><tbody>${rows}</tbody></table></div><small class="text-muted">${list.length} station(s) shown</small>`;
}

let detailLoadingInFlight = new Set();
let detailCache = {};

async function toggleDetail(row, globalId) {
  const detailRow = document.getElementById('detail-' + globalId);
  if (!detailRow) return;
  const isShown = detailRow.classList.contains('show');
  document.querySelectorAll('.detail-row.show').forEach(el => el.classList.remove('show'));
  if (isShown) return;
  detailRow.classList.add('show');
  if (!detailLoadingInFlight.has(globalId) && !detailCache[globalId]) {
    detailLoadingInFlight.add(globalId);
    try {
      const station = allStations.find(s => s.globalId === globalId);
      if (!station) { document.getElementById('detailInner-' + globalId).innerHTML = '<p class="text-danger small">Station not found.</p>'; return; }
      const [oR, dR] = await Promise.all([
        fetch(BASE + '/stations/' + station.id + '/operators').then(r=>r.json()),
        fetch(BASE + '/stations/' + station.id + '/departures').then(r=>r.json())
      ]);
      const operators = oR.data || [];
      const departures = dR.data || [];
      const oHtml = operators.length ? '<h6>Operators</h6><div class="table-responsive"><table class="table table-sm table-bordered"><thead><tr><th>Name</th><th>Type</th></tr></thead><tbody>' + operators.map(op => `<tr><td>${esc(op.name)}</td><td>${esc(op.operatorType)}</td></tr>`).join('') + '</tbody></table></div>' : '<p class="text-muted small">No operators at this station.</p>';
      const dHtml = departures.length ? '<h6>Departures</h6><div class="table-responsive"><table class="table table-sm table-bordered"><thead><tr><th>Route</th><th>Headsign</th><th>Scheduled</th><th>Estimated</th><th>Delay</th></tr></thead><tbody>' + departures.map(dp => {
        const delay = dp.delaySeconds != null ? (dp.delaySeconds > 0 ? '<span class="text-danger">+' + Math.round(dp.delaySeconds/60) + 'm</span>' : '<span class="text-success">On time</span>') : '-';
        return `<tr><td>${esc(dp.routeName)}</td><td>${esc(dp.headsign)}</td><td>${dp.scheduledDeparture ? new Date(dp.scheduledDeparture).toLocaleTimeString() : '-'}</td><td>${dp.estimatedDeparture ? new Date(dp.estimatedDeparture).toLocaleTimeString() : '-'}</td><td>${delay}</td></tr>`;
      }).join('') + '</tbody></table></div>' : '<p class="text-muted small">No upcoming departures.</p>';
      detailCache[globalId] = oHtml + dHtml;
      document.getElementById('detailInner-' + globalId).innerHTML = oHtml + dHtml + '<a href="/map/" target="_blank" class="btn btn-sm btn-outline-success mt-2"><i class="bi bi-map"></i> View on Map</a>';
    } catch(e) {
      document.getElementById('detailInner-' + globalId).innerHTML = '<p class="text-danger small">Error loading details.</p>';
    } finally {
      detailLoadingInFlight.delete(globalId);
    }
  } else if (detailCache[globalId]) {
    document.getElementById('detailInner-' + globalId).innerHTML = detailCache[globalId] + '<a href="/map/" target="_blank" class="btn btn-sm btn-outline-success mt-2"><i class="bi bi-map"></i> View on Map</a>';
  }
  setTimeout(() => detailRow.scrollIntoView({behavior:'smooth', block:'center'}), 100);
}

function showError(msg) { const e = document.getElementById('error'); e.textContent = msg; e.classList.remove('d-none'); }
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

loadStations();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
