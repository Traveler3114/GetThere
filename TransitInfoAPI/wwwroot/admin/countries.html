<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Countries - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <nav class="mb-4"><a href="/" class="text-decoration-none">&larr; Home</a> &gt; <a href="/admin/" class="text-decoration-none">Admin</a></nav>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Countries</h1>
    <div>
      <button class="btn btn-success btn-sm" onclick="showAddModal()"><i class="bi bi-plus-lg"></i> Add Country</button>
      <button class="btn btn-outline-primary btn-sm" onclick="loadCountries()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
    </div>
  </div>

  <div id="loading" class="text-center py-4 text-muted"><i class="bi bi-hourglass-split"></i> Loading...</div>
  <div id="error" class="alert alert-danger d-none"></div>
  <div id="content" class="d-none"></div>
</div>

<script>
const BASE = '';
let allCountries = [];

async function loadCountries() {
  document.getElementById('loading').classList.remove('d-none');
  document.getElementById('error').classList.add('d-none');
  document.getElementById('content').classList.add('d-none');
  try {
    const r = await fetch(BASE + '/countries');
    if (!r.ok) { showError('Failed to load: ' + (r.statusText || 'Unknown error')); return; }
    const j = await r.json();
    allCountries = j.data || [];
    renderCountries();
    document.getElementById('loading').classList.add('d-none');
    document.getElementById('content').classList.remove('d-none');
  } catch(e) {
    document.getElementById('loading').classList.add('d-none');
    showError('Failed to load countries: ' + e.message);
  }
}

function renderCountries() {
  if (!allCountries.length) {
    document.getElementById('content').innerHTML = '<div class="alert alert-info">No countries configured.</div>';
    return;
  }
  const rows = allCountries.map(c => `<tr>
    <td>${c.id}</td>
    <td>${esc(c.name)}</td>
    <td><code>${esc(c.isoCode)}</code></td>
    <td>${esc(c.continent||'-')}</td>
  </tr>`).join('');
  document.getElementById('content').innerHTML = `<div class="table-responsive"><table class="table table-striped table-hover"><thead class="table-dark"><tr><th>ID</th><th>Name</th><th>ISO Code</th><th>Continent</th></tr></thead><tbody>${rows}</tbody></table></div><small class="text-muted">${allCountries.length} country(ies)</small>`;
}

function showAddModal() {
  const html = `<div class="modal fade" id="addModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Add Country</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" id="addName" class="form-control form-control-sm" placeholder="e.g. Croatia">
      </div>
      <div class="mb-3">
        <label class="form-label">ISO Code</label>
        <input type="text" id="addIsoCode" class="form-control form-control-sm" placeholder="e.g. HR" maxlength="2">
      </div>
      <div class="mb-3">
        <label class="form-label">Continent</label>
        <input type="text" id="addContinent" class="form-control form-control-sm" placeholder="e.g. Europe">
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
      <button type="button" class="btn btn-primary" onclick="addCountry()">Add Country</button>
    </div>
  </div></div></div>`;
  const existing = document.getElementById('addModal');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', html);
  const modal = new bootstrap.Modal(document.getElementById('addModal'));
  modal.show();
  document.getElementById('addModal').addEventListener('hidden.bs.modal', () => document.getElementById('addModal').remove());
}

async function addCountry() {
  const name = document.getElementById('addName').value.trim();
  const isoCode = document.getElementById('addIsoCode').value.trim().toUpperCase();
  const continent = document.getElementById('addContinent').value.trim();
  if (!name || !isoCode) { alert('Name and ISO code are required.'); return; }
  try {
    const r = await fetch(BASE + '/countries', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, isoCode, continent})
    });
    if (r.ok) {
      bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
      loadCountries();
    } else {
      const j = await r.json().catch(() => ({}));
      alert(j.title || j.message || 'Failed to add country.');
    }
  } catch(e) { alert('Error: ' + e.message); }
}

function showError(msg) { const e = document.getElementById('error'); e.textContent = msg; e.classList.remove('d-none'); }
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

loadCountries();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
