<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Transit Map</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; }
#map { height: 100%; width: 100%; }
#sidebar {
  position: fixed; top: 0; right: -400px; width: 400px; height: 100%;
  background: #fff; box-shadow: -2px 0 12px rgba(0,0,0,0.15);
  transition: right 0.3s ease; z-index: 1000; overflow-y: auto; padding: 20px;
}
#sidebar.open { right: 0; }
#sidebar h2 { margin-bottom: 8px; font-size: 1.25rem; }
#sidebar .close-btn {
  float: right; cursor: pointer; font-size: 1.5rem; border: none;
  background: none; color: #666; line-height: 1;
}
#sidebar .close-btn:hover { color: #000; }
#sidebar .info-row { margin: 6px 0; font-size: 0.9rem; }
#sidebar .info-row strong { display: inline-block; width: 100px; color: #555; }
#sidebar .departures { margin-top: 12px; }
#sidebar .departures h3 { font-size: 1rem; margin-bottom: 6px; }
#sidebar .departure-item {
  padding: 6px 8px; border-bottom: 1px solid #eee; font-size: 0.85rem;
}
.route-type-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  color: #fff; font-size: 0.75rem; font-weight: 600;
}
.loading { color: #999; font-style: italic; }
</style>
</head>
<body>
<div id="map"></div>
<div id="sidebar">
  <button class="close-btn" onclick="closeSidebar()">&times;</button>
  <div id="sidebar-content"><p class="loading">Click a stop to view details</p></div>
</div>

<script>
const ROUTE_COLORS = {
  Tram: '#33a02c', Bus: '#1f78b4', Trolleybus: '#1f78b4',
  Metro: '#e31a1c', Rail: '#b15928', Ferry: '#006994', Flight: '#888',
  CableCar: '#ff7f00', Funicular: '#ff7f00', Coach: '#6a3d9a',
  BikeShare: '#6a3d9a', ScooterShare: '#ff7f00',
  default: '#888'
};

const map = new maplibregl.Map({
  container: 'map',
  style: '/map/style.json',
  center: [16.0, 45.8],
  zoom: 7
});

map.addControl(new maplibregl.NavigationControl());
map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }));

let debounceTimer = null;
let sidebarOpen = false;
const stationsSource = 'gt-stops';
const routesSource = 'routes';
const vehiclesSource = 'vehicles';

function getRouteColor(type) {
  return ROUTE_COLORS[type] || ROUTE_COLORS.default;
}

function loadMapData() {
  const bounds = map.getBounds();
  const center = map.getCenter();
  const sw = bounds.getSouthWest();
  const ne = bounds.getNorthEast();
  const dlat = (ne.lat - sw.lat) / 2;
  const dlon = (ne.lng - sw.lng) / 2;
  const radiusKm = Math.max(
    dlat * 111, dlon * 111 * Math.cos(center.lat * Math.PI / 180)
  ) * 1.5;

  const stationUrl = `/stations?format=geojson&lat=${center.lat}&lon=${center.lng}&radiusKm=${radiusKm}&after=0&perPage=500`;
  const routeUrl = `/routes?format=geojson&after=0&perPage=500&minLat=${sw.lat}&minLon=${sw.lng}&maxLat=${ne.lat}&maxLon=${ne.lng}`;

  fetch(stationUrl).then(r => r.json()).then(data => {
    const src = map.getSource(stationsSource);
    if (src && data?.type === 'FeatureCollection') {
      src.setData(data);
    }
  }).catch(() => {});

  fetch(routeUrl).then(r => r.json()).then(data => {
    const src = map.getSource(routesSource);
    if (src && data?.type === 'FeatureCollection') {
      src.setData(data);
    }
  }).catch(() => {});
}

function loadVehicles() {
  fetch('/realtime/vehicles').then(r => r.json()).then(resp => {
    const vehicles = resp.data || [];
    const fc = {
      type: 'FeatureCollection',
      features: vehicles.map(v => ({
        type: 'Feature',
        geometry: { type: 'Point', coordinates: [v.longitude, v.latitude] },
        properties: {
          vehicleId: v.vehicleId, routeId: v.routeId, tripId: v.tripId,
          bearing: v.bearing, lastUpdated: v.lastUpdated,
          routeType: v.routeType
        }
      }))
    };
    const src = map.getSource(vehiclesSource);
    if (src) { src.setData(fc); }
  }).catch(() => {});
}

map.on('load', () => {
  map.addSource(stationsSource, {
    type: 'geojson',
    data: { type: 'FeatureCollection', features: [] },
    cluster: true,
    clusterMaxZoom: 13,
    clusterRadius: 50
  });
  map.addSource(routesSource, { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
  map.addSource(vehiclesSource, { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });

  // Route lines colored by type
  map.addLayer({
    id: 'routes-line',
    type: 'line',
    source: routesSource,
    paint: {
      'line-color': [
        'match', ['get', 'routeType'],
        'Tram', '#33a02c',
        'Bus', '#1f78b4',
        'Trolleybus', '#1f78b4',
        'Metro', '#e31a1c',
        'Rail', '#b15928',
        'Ferry', '#006994',
        'CableCar', '#ff7f00',
        'Funicular', '#ff7f00',
        'Coach', '#6a3d9a',
        '#888'
      ],
      'line-width': 2,
      'line-opacity': 0.7
    }
  });

  // Cluster circles
  map.addLayer({
    id: 'stations-cluster',
    type: 'circle',
    source: stationsSource,
    filter: ['has', 'point_count'],
    paint: {
      'circle-color': '#1f78b4',
      'circle-radius': [
        'step', ['get', 'point_count'],
        15, 10,
        20, 50,
        25
      ],
      'circle-opacity': 0.85,
      'circle-stroke-width': 2,
      'circle-stroke-color': '#fff'
    }
  });

  // Cluster count labels
  map.addLayer({
    id: 'stations-cluster-count',
    type: 'symbol',
    source: stationsSource,
    filter: ['has', 'point_count'],
    layout: {
      'text-field': '{point_count_abbreviated}',
      'text-font': ['Open Sans Regular'],
      'text-size': 12
    },
    paint: { 'text-color': '#fff' }
  });

  // Load stop icons
  const STOP_ICONS = [
    { id: 'stop-bus', file: '/images/bus.png', types: ['Bus', 'Trolleybus', 'Coach'] },
    { id: 'stop-tram', file: '/images/tram.png', types: ['Tram'] },
    { id: 'stop-train', file: '/images/train.png', types: ['Rail', 'Metro', 'Ferry', 'CableCar', 'Funicular'] },
    { id: 'stop-default', file: '/images/bus.png', types: [] }
  ];

  map.on('styleimagemissing', async (e) => {
    const icon = STOP_ICONS.find(i => i.id === e.id);
    if (!icon) return;
    const img = await new Promise((resolve, reject) => {
      const i = new Image(); i.crossOrigin = 'anonymous';
      i.onload = () => resolve(i); i.onerror = reject;
      i.src = window.location.origin + icon.file;
    });
    const canvas = document.createElement('canvas');
    canvas.width = img.width; canvas.height = img.height;
    canvas.getContext('2d').drawImage(img, 0, 0);
    const data = canvas.getContext('2d').getImageData(0, 0, img.width, img.height);
    if (!map.hasImage(e.id)) map.addImage(e.id, data);
  });

  const _stationIconExpr = ['case',
    ['in', ['get', 'primaryRouteType'], ['literal', ['Bus', 'Trolleybus', 'Coach']]], 'stop-bus',
    ['in', ['get', 'primaryRouteType'], ['literal', ['Tram']]], 'stop-tram',
    ['in', ['get', 'primaryRouteType'], ['literal', ['Rail', 'Metro', 'Ferry', 'CableCar', 'Funicular']]], 'stop-train',
    'stop-bus'
  ];

  // Individual stop icons (unclustered)
  map.addLayer({
    id: 'stations-circle',
    type: 'symbol',
    source: stationsSource,
    filter: ['!', ['has', 'point_count']],
    layout: {
      'icon-image': _stationIconExpr,
      'icon-size': 0.35,
      'icon-anchor': 'bottom',
      'icon-allow-overlap': true,
      'icon-ignore-placement': true
    }
  });

  // Vehicle dots
  map.addLayer({
    id: 'vehicles-circle',
    type: 'circle',
    source: vehiclesSource,
    paint: {
      'circle-radius': 6,
      'circle-color': '#7b2d8e',
      'circle-stroke-width': 2,
      'circle-stroke-color': '#fff',
      'circle-opacity': 0.9
    }
  });

  // Vehicle bearing arrows
  map.addLayer({
    id: 'vehicles-arrow',
    type: 'symbol',
    source: vehiclesSource,
    filter: ['!=', ['get', 'bearing'], null],
    layout: {
      'text-field': '▲',
      'text-rotate': ['get', 'bearing'],
      'text-rotation-alignment': 'map',
      'text-size': 14,
      'text-allow-overlap': true,
      'text-ignore-placement': true
    },
    paint: {
      'text-color': '#fff',
      'text-halo-color': '#7b2d8e',
      'text-halo-width': 2
    }
  });

  loadMapData();
  loadVehicles();
  setInterval(loadVehicles, 30000);
});

map.on('moveend', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(loadMapData, 500);
});

// Click cluster -> zoom in
map.on('click', 'stations-cluster', (e) => {
  const features = map.queryRenderedFeatures(e.point, { layers: ['stations-cluster'] });
  const clusterId = features[0].properties.cluster_id;
  map.getSource(stationsSource).getClusterExpansionZoom(clusterId, (err, zoom) => {
    if (err) return;
    map.easeTo({ center: features[0].geometry.coordinates, zoom });
  });
});

// Click individual stop -> show details
map.on('click', 'stations-circle', (e) => {
  const props = e.features[0].properties;
  showStationDetails(props.id, props);
});

// Cursor for clusters
map.on('mouseenter', 'stations-cluster', () => { map.getCanvas().style.cursor = 'pointer'; });
map.on('mouseleave', 'stations-cluster', () => { map.getCanvas().style.cursor = ''; });

// Cursor for individual stops
map.on('mouseenter', 'stations-circle', () => { map.getCanvas().style.cursor = 'pointer'; });
map.on('mouseleave', 'stations-circle', () => { map.getCanvas().style.cursor = ''; });

function showStationDetails(id, props) {
  const content = document.getElementById('sidebar-content');
  const type = props.stationType || 'unknown';
  const rt = props.primaryRouteType || props.routeType || '';
  const color = getRouteColor(rt);

  let html = `
    <h2>${props.name || 'Unknown'}</h2>
    <div class="info-row"><strong>Type</strong> ${type}</div>
    <div class="info-row"><strong>Onestop ID</strong> ${props.onestopId || '-'}</div>
    <div class="info-row"><strong>Route type</strong> <span class="route-type-badge" style="background:${color}">${rt || '-'}</span></div>
    <div class="info-row"><strong>Country</strong> ${props.countryName || '-'}</div>
    <div class="departures"><h3>Next departures</h3><p class="loading">Loading...</p></div>
  `;

  document.getElementById('sidebar').classList.add('open');
  sidebarOpen = true;
  content.innerHTML = html;

  fetch(`/stations/${id}/departures?count=5`).then(r => r.json()).then(resp => {
    const deps = resp.data || [];
    if (deps.length === 0) {
      document.querySelector('.departures .loading').textContent = 'No upcoming departures';
      return;
    }
    let depHtml = '<h3>Next departures</h3>';
    deps.forEach(d => {
      const time = d.scheduledDeparture ? new Date(d.scheduledDeparture).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '-';
      const delay = d.delaySeconds ? ` (${Math.round(d.delaySeconds / 60)} min delay)` : '';
      depHtml += `<div class="departure-item"><strong>${time}</strong> ${d.headsign || ''} — ${d.routeName || ''}${delay}</div>`;
    });
    document.querySelector('.departures').innerHTML = depHtml;
  }).catch(() => {
    document.querySelector('.departures .loading').textContent = 'Failed to load departures';
  });
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  sidebarOpen = false;
}
</script>
</body>
</html>
