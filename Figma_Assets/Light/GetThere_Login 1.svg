  <text x="47" y="338" font-family="Segoe UI, Roboto, sans-serif" font-size="16" fill="#A0A0A0">Email</text>

  <text x="32" y="381" font-family="Segoe UI, Roboto, sans-serif" font-size="14" font-weight="700" fill="#000000">Password</text>
  <rect x="32" y="389" width="350" height="50" rx="8" fill="#FFFFFF" stroke="#EBEBEC"/>
