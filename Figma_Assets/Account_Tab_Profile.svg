<svg width="414" height="896" viewBox="0 0 414 896" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- BACKGROUND -->
  <rect width="414" height="896" fill="#F8F9FA"/>
  
  <!-- HEADER AREA (Constant) -->
  <g transform="translate(0, 60)">
    <text x="207" y="10" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle" fill="black">Profile</text>
    <g transform="translate(24, 40)">
      <circle cx="20" cy="20" r="20" fill="#E5E7EB" stroke="#512BD4" stroke-width="2"/>
      <text x="50" y="18" font-family="Arial" font-size="16" font-weight="bold" fill="black">Luka S.</text>
      <text x="50" y="34" font-family="Arial" font-size="11" font-weight="bold" fill="#10B981">● VERIFIED</text>
    </g>
  </g>

  <!-- ─── SEGMENTED SWITCH (ACCOUNT ACTIVE) ─── -->
  <rect x="24" y="160" width="366" height="48" rx="24" fill="#E2E8F0"/>
  <!-- Switch Button Background moved to the RIGHT -->
  <rect x="207" y="164" width="179" height="40" rx="20" fill="white" filter="url(#premiumShadow)"/>
  <text x="117" y="189" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#64748B">Wallet</text>
  <text x="300" y="189" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#512BD4">Account</text>

  <!-- ─── ACCOUNT CONTENT ─── -->
  <g id="AccountView" transform="translate(24, 230)">
    
    <!-- PERSONAL INFO CARD -->
    <text x="0" y="20" font-family="Arial" font-size="18" font-weight="bold" fill="black">Personal Information</text>
    <rect x="0" y="40" width="366" height="150" rx="24" fill="white" filter="url(#premiumShadow)"/>
    
    <g transform="translate(20, 65)">
       <text y="0" font-family="Arial" font-size="12" fill="#94A3B8">FULL NAME</text>
       <text y="20" font-family="Arial" font-size="15" font-weight="bold" fill="black">Luka Suncana</text>
       
       <text y="60" font-family="Arial" font-size="12" fill="#94A3B8">EMAIL ADDRESS</text>
       <text y="80" font-family="Arial" font-size="15" font-weight="bold" fill="black">luka.s@example.com</text>
    </g>

    <!-- SETTINGS LIST CARD -->
    <text x="0" y="230" font-family="Arial" font-size="18" font-weight="bold" fill="black">Settings &amp; Security</text>
    <rect x="0" y="250" width="366" height="240" rx="24" fill="white" filter="url(#premiumShadow)"/>
    
    <!-- Rows -->
    <g transform="translate(20, 270)">
       <text y="20" font-family="Arial" font-size="15" fill="#374151">Payment Methods</text>
       <line x1="0" y1="45" x2="326" y2="45" stroke="#F1F5F9"/>
       
       <text y="80" font-family="Arial" font-size="15" fill="#374151">Security &amp; Password</text>
       <line x1="0" y1="105" x2="326" y2="105" stroke="#F1F5F9"/>

       <text y="140" font-family="Arial" font-size="15" fill="#374151">Language &amp; Region</text>
       <line x1="0" y1="165" x2="326" y2="165" stroke="#F1F5F9"/>
       
       <text y="200" font-family="Arial" font-size="15" fill="#991B1B" font-weight="bold">Log Out</text>
    </g>

  </g>

  <!-- BOTTOM NAV (SAME) -->
  <g transform="translate(0, 810)">
    <rect width="414" height="86" fill="white" filter="url(#navShadow)"/>
    <g transform="translate(0, 15)">
      <circle cx="362.25" cy="20" r="10" stroke="#512BD4" stroke-width="2.5"/>
      <text x="362.25" y="45" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="#512BD4">Profile</text>
      <!-- Indicators for others... -->
    </g>
  </g>

  <!-- DEFS -->
  <defs>
    <filter id="premiumShadow" x="-20" y="0" width="414" height="300" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="black" flood-opacity="0.15"/>
    </filter>
    <filter id="navShadow" x="0" y="-10" width="414" height="100" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="-4" stdDeviation="12" flood-opacity="0.06"/>
    </filter>
  </defs>
</svg>
