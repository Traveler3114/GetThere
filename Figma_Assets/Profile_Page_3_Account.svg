<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="390" height="844" fill="#F3F4F6"/>
  
  <!-- Header -->
  <g id="Header">
    <circle cx="54" cy="64" r="30" fill="white" stroke="#512BD4" stroke-width="3"/>
    <path d="M54 50C57.866 50 61 53.134 61 57C61 60.866 57.866 64 54 64C50.134 64 47 60.866 47 57C47 53.134 50.134 50 54 50ZM54 66C60.6274 66 66 69.3579 66 73.5V75H42V73.5C42 69.3579 47.3726 66 54 66Z" fill="#512BD4"/>
    <text x="96" y="62" fill="#111827" style="font-family: sans-serif; font-weight: bold; font-size: 20px;">Luka S.</text>
    <circle cx="100" cy="78" r="3" fill="#10B981"/>
    <text x="108" y="82" fill="#10B981" style="font-family: sans-serif; font-weight: bold; font-size: 11px; letter-spacing: 0.05em;">VERIFIED</text>
  </g>

  <!-- Tab Switcher (Account Active) -->
  <rect x="24" y="114" width="342" height="54" rx="27" fill="#E2E8F0"/>
  <rect x="195" y="118" width="167" height="46" rx="23" fill="white"/>
  <text x="111" y="147" fill="#64748B" text-anchor="middle" style="font-family: sans-serif; font-weight: bold; font-size: 14px;">Wallet</text>
  <text x="281" y="147" fill="#512BD4" text-anchor="middle" style="font-family: sans-serif; font-weight: bold; font-size: 14px;">Account</text>

  <!-- Account Content -->
  <g id="AccountView">
    <!-- Personal Info Section -->
    <text x="24" y="200" fill="#111827" style="font-family: sans-serif; font-weight: bold; font-size: 16px;">Personal Information</text>
    <rect x="20" y="215" width="350" height="120" rx="14" fill="white"/>
    
    <text x="40" y="245" fill="#94A3B8" style="font-family: sans-serif; font-weight: bold; font-size: 10px;">FULL NAME</text>
    <text x="40" y="265" fill="#111827" style="font-family: sans-serif; font-weight: bold; font-size: 15px;">Luka S.</text>
    
    <text x="40" y="295" fill="#94A3B8" style="font-family: sans-serif; font-weight: bold; font-size: 10px;">EMAIL ADDRESS</text>
    <text x="40" y="315" fill="#111827" style="font-family: sans-serif; font-weight: bold; font-size: 15px;">luka.s@email.com</text>

    <!-- Settings Section -->
    <text x="24" y="365" fill="#111827" style="font-family: sans-serif; font-weight: bold; font-size: 16px;">Settings &amp; Security</text>
    <rect x="20" y="380" width="350" height="180" rx="14" fill="white"/>
    
    <!-- Item 1: Privacy -->
    <circle cx="44" cy="405" r="12" fill="#F1F5F9"/>
    <path d="M44 398L48 402V408H40V402L44 398Z" fill="#512BD4"/> <!-- Simple Shield/Profile Vector -->
    <text x="68" y="410" fill="#111827" style="font-family: sans-serif; font-size: 15px;">Account Privacy</text>
    <path d="M350 401L355 405L350 409" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <rect x="68" y="425" width="280" height="1" fill="#F1F5F9"/>

    <!-- Item 2: Payments -->
    <circle cx="44" cy="450" r="12" fill="#F1F5F9"/>
    <rect x="38" y="445" width="12" height="10" rx="2" fill="#512BD4"/> <!-- Simple Card Vector -->
    <text x="68" y="455" fill="#111827" style="font-family: sans-serif; font-size: 15px;">Payment Methods</text>
    <path d="M350 446L355 450L350 454" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="68" y="470" width="280" height="1" fill="#F1F5F9"/>

    <!-- Item 3: Language -->
    <circle cx="44" cy="495" r="12" fill="#F1F5F9"/>
    <circle cx="44" cy="495" r="6" stroke="#512BD4" stroke-width="2"/> <!-- Globe Vector -->
    <text x="68" y="500" fill="#111827" style="font-family: sans-serif; font-size: 15px;">Language &amp; Region</text>
    <path d="M350 491L355 495L350 499" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="68" y="515" width="280" height="1" fill="#F1F5F9"/>

    <!-- Item 4: Sign Out -->
    <circle cx="44" cy="540" r="12" fill="#FEF2F2"/>
    <path d="M42 535H40V545H42" stroke="#991B1B" stroke-width="2" stroke-linecap="round"/> <!-- Log Off Vector -->
    <path d="M44 540H50M50 540L47 537M50 540L47 543" stroke="#991B1B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="68" y="545" fill="#991B1B" style="font-family: sans-serif; font-weight: bold; font-size: 15px;">Sign Out</text>
  </g>
</svg>
