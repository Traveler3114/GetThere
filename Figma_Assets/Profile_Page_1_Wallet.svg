    <text x="116" y="162" font-family="sans-serif" font-size="16" font-weight="bold" fill="#512BD4" text-anchor="middle">Wallet</text>
    <text x="303" y="162" font-family="sans-serif" font-size="16" font-weight="bold" fill="#64748B" text-anchor="middle">Account</text>
    <!-- Balance Card -->
    <rect x="20" y="210" width="374" height="200" rx="28" fill="url(#cardGrad)" filter="url(#softShadow)"/>
    <text x="207" y="255" font-family="sans-serif" font-size="12" font-weight="bold" fill="#FFF" opacity="0.8" text-anchor="middle" letter-spacing="1">CURRENT BALANCE</text>
    <text x="177" y="325" font-family="sans-serif" font-size="46" font-weight="bold" fill="#FFF" text-anchor="middle">EUR 124.50</text>
    <circle cx="330" cy="308" r="22" fill="#FFF" opacity="0.2"/>
    <!-- Eye vector instead of unicode emoji -->
    <path d="M330 300C323 300 318 308 318 308C318 308 323 316 330 316C337 316 342 308 342 308C342 308 337 300 330 300ZM330 313C326.5 313 323 309 321.5 308C323 307 326.5 303 330 303C333.5 303 337 307 338.5 308C337 309 333.5 313 330 313Z" fill="#FFF"/>
    <circle cx="330" cy="308" r="4" fill="#FFF"/>
    
    <rect x="157" y="385" width="100" height="50" rx="25" fill="#FFF" filter="url(#lowShadow)"/>
    <text x="207" y="415" font-family="sans-serif" font-size="18" font-weight="bold" fill="#111827" text-anchor="middle">Add</text>

    <text x="207" y="480" font-family="sans-serif" font-size="18" font-weight="bold" fill="#111827" text-anchor="middle">Recent Activity</text>
    <path d="M 0 500 Q 0 460 40 460 L 374 460 Q 414 460 414 500 L 414 896 L 0 896 Z" fill="#FFFFFF" filter="url(#softShadow)"/>
    
    <rect x="187" y="475" width="40" height="5" rx="2.5" fill="#E5E7EB"/>
    
    <!-- Row 1 -->
    <rect x="20" y="510" width="374" height="70" rx="14" fill="#FFF" filter="url(#lowShadow)"/>
    <circle cx="50" cy="545" r="18" fill="#F3F4F6"/>
    <!-- Box icon inside circle -->
    <rect x="42" y="537" width="16" height="16" rx="2" fill="#9CA3AF"/>
    <text x="85" y="540" font-family="sans-serif" font-size="16" font-weight="bold" fill="#111827">Bus Ticket ZG</text>
    <text x="85" y="560" font-family="sans-serif" font-size="13" fill="#9CA3AF">15 Apr 14:30</text>
    <text x="374" y="550" font-family="sans-serif" font-size="16" font-weight="bold" fill="#EF4444" text-anchor="end">- EUR 4.50</text>

    <!-- Row 2 -->
    <rect x="20" y="595" width="374" height="70" rx="14" fill="#FFF" filter="url(#lowShadow)"/>
    <circle cx="50" cy="630" r="18" fill="#F3F4F6"/>
    <!-- Box icon inside circle -->
    <rect x="42" y="622" width="16" height="16" rx="2" fill="#9CA3AF"/>
    <text x="85" y="625" font-family="sans-serif" font-size="16" font-weight="bold" fill="#111827">Wallet Top-Up</text>
    <text x="85" y="645" font-family="sans-serif" font-size="13" fill="#9CA3AF">14 Apr 09:12</text>
    <text x="374" y="635" font-family="sans-serif" font-size="16" font-weight="bold" fill="#10B981" text-anchor="end">+ EUR 50.00</text>
