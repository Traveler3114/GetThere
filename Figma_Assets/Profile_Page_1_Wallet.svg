      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    <filter id="lowShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5F8FF5" />
      <stop offset="55%" stop-color="#5565EA" />
      <stop offset="100%" stop-color="#5A24D9" />
    </linearGradient>
</defs>
<rect width="414" height="896" fill="#F3F4F6"/>
    <!-- Header -->
    <circle cx="50" cy="70" r="26" fill="#E5E7EB" stroke="#512BD4" stroke-width="3"/>
    
    <!-- User Icon Path -->
    <path d="M50 56C53.3137 56 56 58.6863 56 62C56 65.3137 53.3137 68 50 68C46.6863 68 44 65.3137 44 62C44 58.6863 46.6863 56 50 56ZM50 71C56.6274 71 62 74.5817 62 79V80H38V79C38 74.5817 43.3726 71 50 71Z" fill="#9CA3AF"/>
    
    <text x="95" y="65" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="900" fill="#111827">Luka S.</text>
    <circle cx="100" cy="81" r="4" fill="#10B981"/>
    <text x="110" y="85" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" fill="#10B981">VERIFIED</text>
