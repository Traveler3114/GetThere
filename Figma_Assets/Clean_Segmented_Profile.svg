<svg width="414" height="896" viewBox="0 0 414 896" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- BACKGROUND -->
  <rect width="414" height="896" fill="#F8F9FA"/>
  
  <!-- HEADER AREA -->
  <g transform="translate(0, 60)">
    <text x="207" y="10" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle" fill="black">Profile</text>
    <g transform="translate(24, 40)">
      <circle cx="20" cy="20" r="20" fill="#E5E7EB" stroke="#512BD4" stroke-width="2"/>
      <text x="50" y="18" font-family="Arial" font-size="16" font-weight="bold" fill="black">Luka S.</text>
      <text x="50" y="34" font-family="Arial" font-size="11" font-weight="bold" fill="#10B981">● VERIFIED</text>
    </g>
  </g>

  <!-- ─── SEGMENTED SWITCH (WALLET ACTIVE) ─── -->
  <rect x="24" y="160" width="366" height="48" rx="24" fill="#E2E8F0"/>
  <rect x="28" y="164" width="179" height="40" rx="20" fill="white" filter="url(#premiumShadow)"/>
  <text x="117" y="189" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#512BD4">Wallet</text>
  <text x="300" y="189" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#64748B">Account</text>

  <!-- ─── WALLET CONTENT (WITH HIDE BALANCE EYE) ─── -->
  <g id="WalletView" transform="translate(24, 230)">
    <rect width="366" height="180" rx="30" fill="url(#balanceGrad)" filter="url(#premiumShadow)"/>
    
    <text x="183" y="60" font-family="Arial" font-size="12" text-anchor="middle" fill="white" fill-opacity="0.8">CURRENT BALANCE</text>
    
    <!-- HIDE BALANCE EYE ICON -->
    <g transform="translate(320, 45)">
       <path d="M12 4.5C7 4.5 2.73 7.61 1 12C2.73 16.39 7 19.5 12 19.5C17 19.5 21.27 16.39 23 12C21.27 7.61 17 4.5 12 4.5ZM12 17C9.24 17 7 14.76 7 12C7 9.24 9.24 7 12 7C14.76 7 17 9.24 17 12C17 14.76 14.76 17 12 17ZM12 9C10.34 9 9 10.34 9 12C9 13.66 10.34 15 12 15C13.66 15 15 13.66 15 12C15 10.34 13.66 9 12 9Z" fill="white" fill-opacity="0.8"/>
    </g>

    <text x="183" y="105" font-family="Arial" font-size="38" font-weight="bold" text-anchor="middle" fill="white">€9586.20</text>
    
    <circle cx="183" cy="180" r="28" fill="white" filter="url(#premiumShadow)"/>
    <path d="M183 172V188M175 180H191" stroke="black" stroke-width="2.5" stroke-linecap="round"/>

    <text x="0" y="250" font-family="Arial" font-size="18" font-weight="bold" fill="black">Recent Activity</text>
    <rect width="366" height="80" rx="20" fill="white" y="270" filter="url(#premiumShadow)"/>
  </g>

  <!-- DEFS -->
  <defs>
    <linearGradient id="balanceGrad" x1="0" y1="0" x2="366" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4E85F2"/>
      <stop offset="1" stop-color="#512BD4"/>
    </linearGradient>
    <filter id="premiumShadow" x="-20" y="0" width="414" height="250" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="black" flood-opacity="0.22"/>
    </filter>
  </defs>
</svg>
