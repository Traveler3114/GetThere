    <text x="207" y="480" font-family="sans-serif" font-size="18" font-weight="bold" fill="#111827" text-anchor="middle">Recent Activity</text>
    <path d="M 0 500 Q 0 460 40 460 L 374 460 Q 414 460 414 500 L 414 896 L 0 896 Z" fill="#FFFFFF" filter="url(#softShadow)"/>
