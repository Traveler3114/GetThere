<svg width="414" height="896" viewBox="0 0 414 896" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    <filter id="lowShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5F8FF5" />
      <stop offset="55%" stop-color="#5565EA" />
      <stop offset="100%" stop-color="#5A24D9" />
    </linearGradient>
</defs>
<rect width="414" height="896" fill="#F3F4F6"/>
    <!-- Header -->
    <circle cx="50" cy="70" r="26" fill="#E5E7EB" stroke="#512BD4" stroke-width="3"/>
    
    <!-- User Icon Path -->
    <path d="M50 56C53.3137 56 56 58.6863 56 62C56 65.3137 53.3137 68 50 68C46.6863 68 44 65.3137 44 62C44 58.6863 46.6863 56 50 56ZM50 71C56.6274 71 62 74.5817 62 79V80H38V79C38 74.5817 43.3726 71 50 71Z" fill="#9CA3AF"/>
    
    <text x="95" y="65" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="900" fill="#111827">Luka S.</text>
    <circle cx="100" cy="81" r="4" fill="#10B981"/>
    <text x="110" y="85" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" fill="#10B981">VERIFIED</text>
    <!-- Tab Switcher Active Wallet -->
    <rect x="20" y="130" width="374" height="54" rx="27" fill="#E2E8F0"/>
    <rect x="24" y="134" width="185" height="46" rx="23" fill="#FFFFFF" filter="url(#lowShadow)"/>
    <text x="116" y="162" font-family="sans-serif" font-size="16" font-weight="bold" fill="#512BD4" text-anchor="middle">Wallet</text>
    <text x="303" y="162" font-family="sans-serif" font-size="16" font-weight="bold" fill="#64748B" text-anchor="middle">Account</text>
    <!-- Balance Card Hidden -->
    <rect x="20" y="210" width="374" height="200" rx="28" fill="url(#cardGrad)" filter="url(#softShadow)"/>
    <text x="207" y="255" font-family="sans-serif" font-size="12" font-weight="bold" fill="#FFF" opacity="0.8" text-anchor="middle" letter-spacing="1">CURRENT BALANCE</text>
    <text x="177" y="325" font-family="sans-serif" font-size="46" font-weight="bold" fill="#FFF" text-anchor="middle">EUR ***.**</text>
    <circle cx="330" cy="308" r="22" fill="#FFF" opacity="0.2"/>
    <!-- Lock vector instead of unicode emoji -->
    <rect x="323" y="306" width="14" height="10" rx="2" fill="#FFF"/>
    <path d="M325 306V302C325 300.5 326.5 299 330 299C333.5 299 335 300.5 335 302V306" stroke="#FFF" stroke-width="2" fill="none"/>
    
    <rect x="157" y="385" width="100" height="50" rx="25" fill="#FFF" filter="url(#lowShadow)"/>
    <text x="207" y="415" font-family="sans-serif" font-size="18" font-weight="bold" fill="#111827" text-anchor="middle">Add</text>

